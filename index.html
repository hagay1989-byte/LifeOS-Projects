<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeOS | Admin Panel</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f111a;
            --card-bg: #1a1d29;
            --accent-gold: #d4af37;
            --text-main: #ffffff;
            --sidebar-width: 250px;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            overflow-x: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--card-bg);
            border-left: 1px solid rgba(212, 175, 55, 0.2);
            position: fixed;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: var(--accent-gold);
            margin-bottom: 40px;
            text-align: center;
        }

        .nav-link {
            padding: 15px;
            color: #a0a0a0;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            border-radius: 8px;
            margin-bottom: 5px;
        }

        .nav-link:hover, .nav-link.active {
            background: rgba(212, 175, 55, 0.1);
            color: var(--accent-gold);
        }

        /* Main */
        .main {
            margin-right: var(--sidebar-width);
            padding: 30px;
            width: 100%;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border-bottom: 3px solid var(--accent-gold);
        }

        /* Accessibility Button */
        #acc-btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 45px;
            height: 45px;
            background: var(--accent-gold);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            z-index: 1000;
        }

        .high-contrast { filter: contrast(120%); }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">LifeOS Admin</div>
        <a href="#" class="nav-link active"><i class="fas fa-th-large"></i> דאשבורד</a>
        <a href="#" class="nav-link"><i class="fas fa-tasks"></i> משימות</a>
        <a href="#" class="nav-link"><i class="fas fa-user-friends"></i> לקוחות</a>
    </div>

    <div class="main">
        <h1>מרכז שליטה</h1>
        <div class="stats">
            <div class="card">
                <p>משימות פתוחות</p>
                <h2>14</h2>
            </div>
            <div class="card">
                <p>פרויקטים בביצוע</p>
                <h2>5</h2>
            </div>
            <div class="card">
                <p>הודעות חדשות</p>
                <h2>3</h2>
            </div>
        </div>
        
        <div class="card" style="min-height: 200px;">
            <h3>עדכונים אחרונים</h3>
            <p style="color: #a0a0a0;">המערכת מוכנה לעבודה. כל הנתונים מסונכרנים.</p>
        </div>
    </div>

    <button id="acc-btn" onclick="document.body.classList.toggle('high-contrast')" title="נגישות">
        <i class="fas fa-universal-access"></i>
    </button>

</body>
</html>
