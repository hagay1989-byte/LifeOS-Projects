<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LifeOS Platinum V184</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-functions.js"></script>

    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.4s ease forwards; }
        body { font-family: 'Heebo', sans-serif; background: radial-gradient(circle at top right, #1e1b4b, #0f172a 80%); background-attachment: fixed; color: white; text-align: right; min-height: 100vh; margin: 0; padding-top: env(safe-area-inset-top); overflow-x: hidden; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 36px; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(14px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 28px; transition: all .25s ease; cursor: pointer; position: relative; overflow: hidden; }
        .progress-bar { background: rgba(255,255,255,0.08); height: 8px; border-radius: 10px; overflow: hidden; width: 100%; position: relative; }
        .progress-fill { height: 100%; transition: width .8s ease; border-radius: 10px; background: #ffffff; box-shadow: 0 0 10px rgba(255,255,255,0.2); }
        .modal-overlay { position: fixed; inset: 0; display: flex; align-items: flex-start; justify-content: center; background: rgba(10, 15, 28, 0.96); backdrop-filter: blur(22px); z-index: 1000; padding: 20px; overflow-y: auto; }
        input, select { background: rgba(255, 255, 255, 0.92) !important; border-radius: 16px !important; color: #0f172a !important; padding: 12px !important; width: 100%; border: none !important; font-weight: bold; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4 flex justify-center items-start">

    <div id="authScreen" class="fixed inset-0 z-[2000] flex items-center justify-center bg-slate-950 p-6 text-center">
        <div class="glass-panel p-10 w-full max-w-sm">
            <h1 class="text-4xl font-black mb-10 italic">LifeOS</h1>
            <input type="email" id="emailInput" placeholder="אימייל" class="mb-3 ltr text-left">
            <input type="password" id="passInput" placeholder="סיסמה" class="mb-8 ltr text-left">
            <button onclick="handleAuth('login')" class="w-full py-4 bg-white text-slate-900 font-black rounded-2xl mb-3">כניסה</button>
            <button onclick="handleAuth('signup')" class="w-full py-4 border border-white/20 text-white font-bold rounded-2xl text-sm">יצירת משתמש</button>
        </div>
    </div>

    <div id="appScreen" class="hidden glass-panel w-full max-w-5xl h-[92vh] flex flex-col overflow-hidden relative shadow-2xl">
        <header class="p-6 flex justify-between items-center border-b border-white/5">
            <div class="flex gap-3 items-center">
                <h1 onclick="goHome()" class="text-2xl font-black italic cursor-pointer">LifeOS</h1>
                <button onclick="toggleGantt()" class="p-3 bg-white/5 rounded-xl"><i class="fas fa-calendar-alt opacity-60"></i></button>
            </div>
            <div class="flex gap-2 items-center">
                <button onclick="toggleView()" id="viewBtn" class="px-4 py-2 bg-white/10 rounded-xl text-[10px] font-black uppercase">דשבורד</button>
                <button onclick="auth.signOut()" class="text-white/20 p-2"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-6">
            <div id="projectsView" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
            
            <div id="dashboardView" class="hidden space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div class="glass-card p-6 text-center"><span class="text-xs opacity-40">תכנון כולל</span><div class="text-xl font-black" id="totalPlanned">₪0</div></div>
                    <div class="glass-card p-6 text-center border-r-4 border-purple-500"><span class="text-xs opacity-40">נוצל בפועל</span><div class="text-xl font-black text-purple-400" id="totalSpent">₪0</div></div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 h-80">
                    <div class="glass-card p-4 relative"><canvas id="mainChart"></canvas></div>
                    <div class="glass-card p-4 relative"><canvas id="categoryChart"></canvas></div>
                </div>
            </div>
            
            <div id="ganttView" class="hidden space-y-4">
                <div id="ganttRows" class="space-y-4 bg-white/5 p-6 rounded-3xl"></div>
            </div>
        </main>
        
        <button onclick="openNewProjectModal()" class="absolute bottom-8 left-8 w-16 h-16 bg-white text-slate-900 rounded-2xl flex items-center justify-center shadow-2xl z-50 hover:scale-110 transition-transform">
            <i class="fas fa-plus text-xl"></i>
        </button>
    </div>

    <div id="newProjectModal" class="hidden modal-overlay text-right">
        <div class="glass-panel p-8 w-full max-w-md mt-4 relative">
            <button onclick="closeNewProjectModal()" class="absolute top-4 left-4 opacity-40 p-2"><i class="fas fa-times"></i></button>
            <h3 class="text-xl font-black mb-6 text-center">פרויקט חדש ✨</h3>
            <div class="space-y-4">
                <input type="text" id="pTitleInp" placeholder="שם הפרויקט...">
                <div class="grid grid-cols-2 gap-2"><input type="date" id="pStartInp" title="התחלה"><input type="date" id="pEndInp" title="סיום"></div>
                <select id="pCatInp"><option value="trip">✈️ טיול</option><option value="event">🎉 אירוע</option><option value="renovation">🏠 שיפוץ</option><option value="general">⚙️ כללי</option></select>
                <button id="aiBtn" onclick="generateAIPreview()" class="w-full py-4 bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-black rounded-2xl">תכנן ב-AI ✨</button>
                <div id="aiPreviewArea" class="hidden bg-white/5 p-4 rounded-2xl max-h-40 overflow-y-auto mb-2" id="previewTasksContainer"></div>
                <input type="number" id="pBudgetInp" placeholder="תקציב ידני (אופציונלי)">
                <button onclick="saveProject()" class="w-full py-4 bg-white text-black font-black rounded-2xl">שמור פרויקט</button>
            </div>
        </div>
    </div>

    <div id="projectDetailModal" class="hidden modal-overlay text-right">
        <div class="glass-panel p-8 w-full max-w-2xl mt-4 relative mb-20">
            <button onclick="closeProjectDetail()" class="absolute top-4 left-4 opacity-40 p-2"><i class="fas fa-times"></i></button>
            <h2 id="detailTitle" class="text-3xl font-black mb-4 italic"></h2>
            <div id="balanceCard" class="glass-card p-6 mb-8"></div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div>
                    <h4 class="text-xs font-bold mb-4 opacity-40 uppercase">משימות</h4>
                    <div id="tasksList" class="space-y-2"></div>
                </div>
                <div>
                    <h4 class="text-xs font-bold mb-4 opacity-40 uppercase">קבצים</h4>
                    <div id="mediaGallery" class="grid grid-cols-3 gap-2"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyB7U5xw_FMThsmM2hNMRnkdMYnD2cutH2s", authDomain: "project-manager-4702c.firebaseapp.com", projectId: "project-manager-4702c", storageBucket: "project-manager-4702c.firebasestorage.app" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();

        let projects=[], currentProjectId=null, userEmail="", isDashboard=false, isGantt=false, tempAiTasks=[];
        let myChart=null, catChart=null;

        function escapeHTML(s){ return s ? s.toString().replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m])) : ""; }

        auth.onAuthStateChanged(u=>{
            if(u){ userEmail=u.email.toLowerCase(); document.getElementById("authScreen").classList.add("hidden"); document.getElementById("appScreen").classList.remove("hidden"); loadData(); }
            else { document.getElementById("authScreen").classList.remove("hidden"); document.getElementById("appScreen").classList.add("hidden"); }
        });

        function loadData(){
            db.collection("family_plans").where("collaborators","array-contains",userEmail).onSnapshot(s=>{
                projects=s.docs.map(d=>({id:d.id,...d.data()}));
                renderUI();
                if(isDashboard) renderDashboard();
                if(isGantt) renderGantt();
                if(currentProjectId) renderProjectInfo();
            });
        }

        function toggleView(){
            isDashboard=!isDashboard; isGantt=false;
            document.getElementById("projectsView").classList.toggle("hidden", isDashboard);
            document.getElementById("dashboardView").classList.toggle("hidden", !isDashboard);
            document.getElementById("ganttView").classList.add("hidden");
            if(isDashboard) setTimeout(renderDashboard, 200);
        }

        function toggleGantt(){
            isGantt=!isGantt; isDashboard=false;
            document.getElementById("projectsView").classList.toggle("hidden", isGantt);
            document.getElementById("ganttView").classList.toggle("hidden", !isGantt);
            document.getElementById("dashboardView").classList.add("hidden");
            if(isGantt) renderGantt();
        }

        function renderUI(){
            const container=document.getElementById("projectsView");
            container.innerHTML=projects.map(p=>{
                const spent=(p.tasks||[]).reduce((a,t)=>t.done?a+Number(t.price):a,0), budget=Number(p.budget||0);
                const pr=budget>0?Math.min(Math.round((spent/budget)*100),100):0;
                return `<div class="glass-card p-8 animate-fadeIn" onclick="openProjectDetail('${p.id}')">
                    <div class="flex justify-between mb-4"><h3 class="text-xl font-bold">${escapeHTML(p.title)}</h3><span class="text-xs opacity-40">₪${(budget-spent).toLocaleString()} יתרה</span></div>
                    <div class="progress-bar"><div class="progress-fill" style="width:${pr}%"></div></div>
                </div>`;
            }).join("");
        }

        function renderDashboard() {
            let tp = 0, ts = 0; const pl = [], bd = [], sd = [], ct = {};
            projects.forEach(p => { 
                const b = Number(p.budget || 0), s = (p.tasks || []).reduce((a, t) => t.done ? a + Number(t.price || 0) : a, 0); 
                tp += b; ts += s; pl.push(p.title); bd.push(b); sd.push(s); 
                ct[p.category||'general'] = (ct[p.category||'general'] || 0) + s; 
            });
            document.getElementById('totalPlanned').innerText = `₪${tp.toLocaleString()}`;
            document.getElementById('totalSpent').innerText = `₪${ts.toLocaleString()}`;
            if (myChart) myChart.destroy(); if (catChart) catChart.destroy();
            const common = { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: 'white' } } } };
            myChart = new Chart(document.getElementById('mainChart').getContext('2d'), { type: 'bar', data: { labels: pl, datasets: [ { label: 'תקציב', data: bd, backgroundColor: 'rgba(255,255,255,0.1)' }, { label: 'נוצל', data: sd, backgroundColor: '#818cf8' } ] }, options: common });
            catChart = new Chart(document.getElementById('categoryChart').getContext('2d'), { type: 'doughnut', data: { labels: Object.keys(ct), datasets: [{ data: Object.values(ct), backgroundColor: ['#818cf8', '#f472b6', '#fbbf24', '#34d399'] }] }, options: common });
        }

        function renderGantt(){
            document.getElementById('ganttRows').innerHTML = projects.map(p=>{
                const b = Number(p.budget || 0), s=(p.tasks||[]).reduce((a,t)=>t.done?a+Number(t.price||0):a,0), pr=b>0?Math.min(Math.round((s/b)*100),100):0;
                return `<div class="p-4 bg-white/5 rounded-2xl mb-3">
                    <div class="flex justify-between mb-2"><b>${p.title}</b><span class="text-[10px] opacity-40">${p.startDate || ''} - ${p.endDate || ''}</span></div>
                    <div class="progress-bar"><div class="progress-fill" style="width: ${pr}%"></div></div>
                </div>`;
            }).join("");
        }

        function goHome(){ isDashboard=isGantt=false; document.getElementById("dashboardView").classList.add("hidden"); document.getElementById("ganttView").classList.add("hidden"); document.getElementById("projectsView").classList.remove("hidden"); }
        function openNewProjectModal(){ document.getElementById("newProjectModal").classList.remove("hidden"); }
        function closeNewProjectModal(){ document.getElementById("newProjectModal").classList.add("hidden"); }
        function openProjectDetail(id){ currentProjectId=id; document.getElementById("projectDetailModal").classList.remove("hidden"); renderProjectInfo(); }
        function closeProjectDetail(){ document.getElementById("projectDetailModal").classList.add("hidden"); currentProjectId=null; }
        async function handleAuth(t){ const e=document.getElementById("emailInput").value, p=document.getElementById("passInput").value; try { t==="login" ? await auth.signInWithEmailAndPassword(e,p) : await auth.createUserWithEmailAndPassword(e,p); } catch(err){ alert(err.message); } }
        
        async function saveProject(){
            const t=document.getElementById("pTitleInp").value; if(!t) return;
            await db.collection("family_plans").add({
                title:t, category:document.getElementById("pCatInp").value, budget:Number(document.getElementById("pBudgetInp").value)||0,
                startDate:document.getElementById("pStartInp").value, endDate:document.getElementById("pEndInp").value,
                collaborators:[userEmail], tasks:tempAiTasks, isArchived:false, createdAt:firebase.firestore.FieldValue.serverTimestamp()
            });
            closeNewProjectModal();
        }
    </script>
</body>
</html>
