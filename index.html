<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>LifeOS Platinum</title>

<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-functions.js"></script>

<style>

@keyframes fadeIn {
from {opacity:0; transform:translateY(10px)}
to {opacity:1; transform:translateY(0)}
}

@keyframes skeleton {
0% {opacity:.3}
50% {opacity:.7}
100% {opacity:.3}
}

.animate-fadeIn {animation:fadeIn .3s ease forwards}

.skeleton{
animation:skeleton 1.5s infinite ease;
background:rgba(255,255,255,.05);
border-radius:16px
}

.modal-overlay{
position:fixed;
inset:0;
display:flex;
align-items:flex-start;
justify-content:center;
background:rgba(10,15,28,.96);
backdrop-filter:blur(22px);
z-index:1000;
padding:20px;
overflow-y:auto;
animation:fadeIn .25s ease
}

body{
font-family:'Heebo',sans-serif;
background:radial-gradient(circle at top right,#1e1b4b,#0f172a 80%);
background-attachment:fixed;
color:white;
text-align:right;
min-height:100vh;
margin:0;
padding-top:env(safe-area-inset-top)
}

.glass-panel{
background:rgba(255,255,255,.03);
backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,.08);
border-radius:36px
}

.glass-card{
background:rgba(255,255,255,.05);
backdrop-filter:blur(14px);
border:1px solid rgba(255,255,255,.08);
border-radius:28px;
transition:all .25s ease;
cursor:pointer
}

input,select{
background:rgba(255,255,255,.92)!important;
border-radius:16px!important;
color:#0f172a!important;
padding:12px!important;
border:none!important;
transition:all .2s ease
}

.progress-bar{
background:rgba(255,255,255,.1);
height:8px;
border-radius:10px;
overflow:hidden
}

.progress-fill{
height:100%;
transition:width .8s ease;
background:#fff
}

::-webkit-scrollbar{display:none}

</style>
</head>

<body class="p-4 flex justify-center items-start">

<div id="authScreen" class="fixed inset-0 z-[2000] flex items-center justify-center bg-slate-950 p-6">

<div class="glass-panel p-10 w-full max-w-sm text-center">

<h1 class="text-4xl font-black mb-10 italic tracking-tighter">
LifeOS
</h1>

<input
type="email"
id="emailInput"
placeholder="אימייל"
class="mb-3 ltr text-left">

<input
type="password"
id="passInput"
placeholder="סיסמה"
class="mb-8 ltr text-left">

<button
onclick="handleAuth('login')"
class="w-full py-4 bg-white text-slate-900 font-black rounded-2xl mb-3">

כניסה

</button>

<button
onclick="handleAuth('signup')"
class="w-full py-4 border border-white/20 text-white font-bold rounded-2xl">

יצירת משתמש

</button>

</div>
</div>

<div id="appScreen" class="hidden glass-panel w-full max-w-5xl h-[92vh] flex flex-col overflow-hidden relative shadow-2xl">

<header class="p-6 flex justify-between items-center border-b border-white/5">

<div class="flex gap-3 items-center">

<h1 onclick="goHome()" class="text-2xl font-black italic cursor-pointer">
LifeOS
</h1>

<button onclick="toggleGantt()" class="p-3 bg-white/5 rounded-xl">
<i class="fas fa-calendar-alt opacity-60"></i>
</button>

</div>

<div class="flex gap-2 items-center">

<button
onclick="openAccessibilityModal()"
class="text-white/30 text-[10px] bg-white/5 px-2 py-1.5 rounded-lg border border-white/5">

<i class="fas fa-universal-access"></i>
נגישות

</button>

<button
onclick="toggleView()"
class="px-4 py-2 bg-white/10 rounded-xl text-[10px] font-black uppercase tracking-widest">

דשבורד

</button>

<button onclick="auth.signOut()" class="text-white/20 p-2 hover:text-white transition-colors">
<i class="fas fa-sign-out-alt"></i>
</button>

</div>

</header>

<main class="flex-1 overflow-y-auto p-6">

<div id="aiInsightCard" class="hidden glass-card p-6 border-r-4 border-indigo-500 mb-6 animate-fadeIn flex gap-4">

<div class="text-indigo-400 text-xl">
<i class="fas fa-brain"></i>
</div>

<div>

<span class="text-[10px] opacity-40 font-bold uppercase block mb-1">
AI INSIGHT
</span>

<p id="aiInsightText" class="text-sm italic leading-relaxed"></p>

</div>
</div>

<div id="projectsView"></div>

<div id="dashboardView" class="hidden space-y-6">

<div class="grid grid-cols-2 gap-4">

<div class="glass-card p-6 text-center">
<span class="text-xs opacity-40">תכנון כולל</span>
<div class="text-xl font-black" id="totalPlanned">₪0</div>
</div>

<div class="glass-card p-6 text-center border-r-4 border-purple-500">
<span class="text-xs opacity-40 font-bold text-purple-400">נוצל בפועל</span>
<div class="text-xl font-black" id="totalSpent">₪0</div>
</div>

</div>

<div class="grid grid-cols-1 md:grid-cols-2 gap-6 h-80">

<div class="glass-card p-4 relative">
<canvas id="mainChart"></canvas>
</div>

<div class="glass-card p-4 relative">
<canvas id="categoryChart"></canvas>
</div>

</div>
</div>

<div id="ganttView" class="hidden space-y-4"></div>

</main>
<button onclick="openNewProjectModal()" class="absolute bottom-8 left-8 w-16 h-16 bg-white text-slate-900 rounded-2xl flex items-center justify-center shadow-2xl hover:scale-110 active:scale-95 transition-transform z-50">
<i class="fas fa-plus text-xl"></i>
</button>

</div>

<div id="newProjectModal" class="hidden modal-overlay text-right">

<div class="glass-panel p-8 w-full max-w-md mt-4 relative">

<button onclick="closeNewProjectModal()" class="absolute top-4 left-4 opacity-40 p-2">
<i class="fas fa-times"></i>
</button>

<h3 class="text-xl font-black mb-6 text-center italic">
תכנון פרויקט חדש ✨
</h3>

<div class="space-y-4">

<input
type="text"
id="pTitleInp"
placeholder="שם הפרויקט (למשל: טיול ליפן)"
class="text-center"
oninput="this.classList.remove('ring-2','ring-red-500')">

<div id="aiSkeleton" class="hidden space-y-2">

<div class="h-12 skeleton"></div>
<div class="h-12 skeleton" style="animation-delay:.2s"></div>

</div>

<div id="aiPreviewArea" class="hidden bg-white/5 p-4 rounded-2xl">

<div id="previewTasksContainer" class="max-h-60 overflow-y-auto space-y-2 mb-4"></div>

<div class="flex justify-between items-center">

<span class="text-indigo-400 text-xs font-bold">
סה״כ:
<span id="totalLabel">₪0</span>
</span>

<button onclick="recalculateAI()" class="text-[10px] text-white/40 uppercase font-black hover:text-white">
חשב מחדש ✨
</button>

</div>
</div>

<select id="pCatInp">

<option value="trip">✈️ טיול</option>
<option value="event">🎉 אירוע</option>
<option value="renovation">🏠 שיפוץ</option>
<option value="general">⚙️ כללי</option>

</select>

<select id="budgetLevel">

<option value="economy">💸 חסכוני</option>
<option value="standard" selected>💰 רגיל</option>
<option value="premium">✨ פרימיום</option>

</select>

<button id="aiBtn"
onclick="generateAIPreview()"
class="w-full py-4 bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-black rounded-2xl shadow-xl transition-all">

תכנן עבורי ב-AI

</button>

<input type="number" id="pBudgetInp" placeholder="תקציב יעד משוער">

<button
onclick="saveProject()"
class="w-full py-4 bg-white text-black font-black rounded-2xl shadow-xl active:scale-95 transition-all">

שמור פרויקט

</button>

</div>
</div>
</div>

<div id="projectDetailModal" class="hidden modal-overlay text-right">

<div class="glass-panel p-8 w-full max-w-2xl mt-4 relative mb-20">

<button onclick="closeProjectDetail()" class="absolute top-4 left-4 opacity-40 p-2">
<i class="fas fa-times"></i>
</button>

<h2 id="detailTitle" class="text-3xl font-black mb-4 italic"></h2>

<div id="balanceCard" class="glass-card p-6 mb-8"></div>

<div class="grid grid-cols-1 md:grid-cols-2 gap-8">

<div>

<h4 class="text-xs font-bold mb-4 opacity-40 uppercase tracking-widest">
משימות ותקציב
</h4>

<div id="tasksList" class="space-y-2"></div>

</div>

<div>

<h4 class="text-xs font-bold mb-4 opacity-40 uppercase tracking-widest">
קבצים ומדיה
</h4>

<div id="mediaGallery" class="grid grid-cols-3 gap-2 mb-4"></div>

<button onclick="document.getElementById('imgUpload').click()" class="w-full py-8 border-2 border-dashed border-white/5 rounded-2xl bg-white/5 opacity-60 hover:opacity-100 transition-all flex flex-col items-center">

<i class="fas fa-camera mb-2"></i>

<span class="text-xs font-bold">
העלה קבלה
</span>

</button>

<input type="file" id="imgUpload" class="hidden" onchange="compressAndUpload(this)">

</div>
</div>
</div>
</div>

<div id="accessibilityModal" class="hidden modal-overlay">

<div class="glass-panel p-8 w-full max-w-md relative">

<button onclick="closeAccessibilityModal()" class="absolute top-4 left-4 opacity-40">
X
</button>

<h3 class="text-xl font-bold mb-4">
הצהרת נגישות ♿
</h3>

<p class="text-sm opacity-70">
האתר מונגש ברמת AA. לתמיכה: support@lifeos.app
</p>

</div>
</div>

<div id="imageLightbox" class="hidden fixed inset-0 z-[3000] bg-black/95 backdrop-blur-xl flex items-center justify-center p-4" onclick="this.classList.add('hidden')">

<img id="fullScreenImg" class="max-w-full max-h-full rounded-2xl shadow-2xl">

</div>

<script>

const firebaseConfig = {

apiKey:"AIzaSyB7U5xw_FMThsmM2hNMRnkdMYnD2cutH2s",
authDomain:"project-manager-4702c.firebaseapp.com",
projectId:"project-manager-4702c",
storageBucket:"project-manager-4702c.firebasestorage.app"

};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let projects=[];
let currentProjectId=null;
let userEmail="";
let isDashboard=false;
let tempAiTasks=[];

let myChart=null;
let catChart=null;

function escapeHTML(s){
return s ? s.toString().replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m])) : ""
}

auth.onAuthStateChanged(u=>{

if(u){

userEmail=u.email.toLowerCase();

document.getElementById("authScreen").classList.add("hidden")
document.getElementById("appScreen").classList.remove("hidden")

loadData()

}

else{

document.getElementById("authScreen").classList.remove("hidden")
document.getElementById("appScreen").classList.add("hidden")

}

})
    function loadData(){

db.collection("family_plans")
.where("collaborators","array-contains",userEmail)
.onSnapshot(s=>{

projects=s.docs.map(d=>({id:d.id,...d.data()}))

renderUI()

if(isDashboard){

renderDashboard()
refreshAIInsights()

}

if(currentProjectId){

renderProjectInfo()

}

})

}

function goHome(){

isDashboard=false

document.querySelectorAll(".modal-overlay")
.forEach(m=>m.classList.add("hidden"))

document.getElementById("dashboardView").classList.add("hidden")
document.getElementById("projectsView").classList.remove("hidden")

document.getElementById("aiInsightCard").classList.add("hidden")

}

function toggleView(){

isDashboard=!isDashboard

document.getElementById("projectsView")
.classList.toggle("hidden",isDashboard)

document.getElementById("dashboardView")
.classList.toggle("hidden",!isDashboard)

if(isDashboard){

renderDashboard()
refreshAIInsights()

}

}

function openAccessibilityModal(){

document.getElementById("accessibilityModal")
.classList.remove("hidden")

}

function closeAccessibilityModal(){

document.getElementById("accessibilityModal")
.classList.add("hidden")

}

function openNewProjectModal(){

document.getElementById("newProjectModal")
.classList.remove("hidden")

}

function closeNewProjectModal(){

document.getElementById("newProjectModal")
.classList.add("hidden")

tempAiTasks=[]

document.getElementById("aiPreviewArea").classList.add("hidden")
document.getElementById("aiSkeleton").classList.add("hidden")

}

function openProjectDetail(id){

currentProjectId=id

document.getElementById("projectDetailModal")
.classList.remove("hidden")

renderProjectInfo()

}

function closeProjectDetail(){

document.getElementById("projectDetailModal")
.classList.add("hidden")

currentProjectId=null

}

async function refreshAIInsights(){

if(projects.length<2) return

try{

const fn=firebase.app().functions("us-central1").httpsCallable("getGlobalInsights")

const res=await fn({

projectData:projects.slice(0,5).map(p=>({

title:p.title,
budget:p.budget,
spent:(p.tasks||[])
.reduce((s,t)=>t.done?s+t.price:s,0)

}))

})

if(res.data?.insight){

document.getElementById("aiInsightText").innerText=res.data.insight
document.getElementById("aiInsightCard").classList.remove("hidden")

}

}catch(e){}

}

function renderUI(){

const container=document.getElementById("projectsView")

if(projects.length===0){

container.innerHTML=`
<div class="flex flex-col items-center justify-center py-24 animate-fadeIn">

<div class="w-16 h-16 bg-indigo-500/10 rounded-full flex items-center justify-center mb-6 animate-pulse">

<i class="fas fa-wand-magic-sparkles text-indigo-400"></i>

</div>

<h2 class="text-2xl font-black italic">
LifeOS מוכנה
</h2>

<p class="opacity-40 text-sm mt-2 mb-8">
צור פרויקט ראשון בעזרת AI
</p>

<button onclick="openNewProjectModal()" class="px-8 py-4 bg-white text-black font-black rounded-2xl">
תכנון ראשון
</button>

</div>
`
return

}

container.className="grid grid-cols-1 md:grid-cols-2 gap-6"

container.innerHTML=projects.map(p=>{

const spent=(p.tasks||[])
.reduce((a,t)=>t.done?a+Number(t.price):a,0)

const budget=Number(p.budget||0)

const pr=budget>0?Math.min(Math.round((spent/budget)*100),100):0

return`

<div class="glass-card p-8 group hover:scale-[1.02] active:scale-95 transition-all" onclick="openProjectDetail('${p.id}')">

<div class="flex justify-between mb-4">

<h3 class="text-xl font-bold">
${escapeHTML(p.title)}
</h3>

<span class="text-xs opacity-40 italic">
₪${(budget-spent).toLocaleString()}
</span>

</div>

<div class="progress-bar">

<div class="progress-fill" style="width:${pr}%"></div>

</div>

</div>

`

}).join("")

}

function renderProjectInfo(){

const p=projects.find(x=>x.id===currentProjectId)

if(!p) return

const spent=(p.tasks||[])
.reduce((a,t)=>t.done?a+Number(t.price):a,0)

const budget=Number(p.budget||0)

const pr=budget>0?Math.min(Math.round((spent/budget)*100),100):0

document.getElementById("detailTitle").innerText=p.title

document.getElementById("balanceCard").innerHTML=`

<div class="text-[10px] opacity-40 uppercase font-black mb-1">
יתרה לניצול
</div>

<div class="text-4xl font-black italic mb-4">
₪${(budget-spent).toLocaleString()}
</div>

<div class="progress-bar">

<div class="progress-fill" style="width:${pr}%"></div>

</div>

`

document.getElementById("tasksList").innerHTML=(p.tasks||[]).map((t,i)=>`

<div class="flex justify-between bg-white/5 p-4 rounded-xl border border-white/5 items-center ${t.done?'opacity-40':''}">

<div class="flex items-center gap-3">

<input type="checkbox" ${t.done?'checked':''}
onchange="toggleTask(${i})"
class="w-5 h-5 accent-indigo-500">

<span>${escapeHTML(t.name)}</span>

</div>

<b>₪${t.price.toLocaleString()}</b>

</div>

`).join("")

}

async function generateAIPreview(){

const t=document.getElementById("pTitleInp").value.trim()

if(!t){

document.getElementById("pTitleInp")
.classList.add("ring-2","ring-red-500")

return

}

document.getElementById("aiSkeleton").classList.remove("hidden")

document.getElementById("aiBtn").disabled=true

try{

const g=firebase.app().functions("us-central1").httpsCallable("generateAIPlan")

const r=await g({

title:t,
category:document.getElementById("pCatInp").value,
budgetLevel:document.getElementById("budgetLevel").value

})

tempAiTasks=(r.data.tasks||[])
.map(tk=>({name:tk.title,price:tk.price,done:false}))

document.getElementById("previewTasksContainer").innerHTML=

tempAiTasks.map(tk=>`

<div class="bg-white/5 p-3 rounded-xl flex justify-between">

<span>${escapeHTML(tk.name)}</span>

<b>₪${tk.price.toLocaleString()}</b>

</div>

`).join("")

document.getElementById("aiPreviewArea").classList.remove("hidden")

document.getElementById("totalLabel").innerText=

`₪${tempAiTasks.reduce((s,x)=>s+x.price,0).toLocaleString()}`

document.getElementById("aiBtn").innerText="שנה תכנון ב-AI ✨"

}

catch(e){

alert("שגיאת AI")

}

finally{

document.getElementById("aiSkeleton").classList.add("hidden")
document.getElementById("aiBtn").disabled=false

}

}

async function recalculateAI(){

const btn=document.querySelector('[onclick="recalculateAI()"]')

btn.disabled=true
btn.innerText="מעדכן..."

try{

const g=firebase.app().functions("us-central1").httpsCallable("recalculateAIPlan")

const r=await g({

title:document.getElementById("pTitleInp").value,
tasks:tempAiTasks,
budgetLevel:document.getElementById("budgetLevel").value

})

tempAiTasks=(r.data.tasks||[])
.map(tk=>({name:tk.title,price:tk.price,done:false}))

document.getElementById("previewTasksContainer").innerHTML=

tempAiTasks.map(tk=>`

<div class="bg-white/5 p-3 rounded-xl flex justify-between">

<span>${escapeHTML(tk.name)}</span>

<b>₪${tk.price.toLocaleString()}</b>

</div>

`).join("")

document.getElementById("totalLabel").innerText=

`₪${tempAiTasks.reduce((s,x)=>s+x.price,0).toLocaleString()}`

}

catch(e){}

finally{

btn.disabled=false
btn.innerText="חשב מחדש ✨"

}

}

async function saveProject(){

const t=document.getElementById("pTitleInp").value

if(!t) return

const finalTasks=tempAiTasks.map(t=>({

name:t.name,
price:Number(t.price)||0,
done:false

}))

await db.collection("family_plans").add({

title:t,
category:document.getElementById("pCatInp").value,
budget:finalTasks.reduce((s,x)=>s+x.price,0),
collaborators:[userEmail],
tasks:finalTasks,
isArchived:false,
createdAt:firebase.firestore.FieldValue.serverTimestamp()

})

closeNewProjectModal()

}

async function handleAuth(t){

const e=document.getElementById("emailInput").value
const p=document.getElementById("passInput").value

try{

t==="login"
?await auth.signInWithEmailAndPassword(e,p)
:await auth.createUserWithEmailAndPassword(e,p)

}

catch(err){

alert(err.message)

}

}

async function toggleTask(i){

const p=projects.find(x=>x.id===currentProjectId)

let t=[...p.tasks]

t[i].done=!t[i].done

await db.collection("family_plans")
.doc(currentProjectId)
.update({tasks:t})

}
let isGantt=false;

function toggleGantt(){

isGantt=!isGantt;

document.getElementById("projectsView")
.classList.toggle("hidden",isGantt);

document.getElementById("ganttView")
.classList.toggle("hidden",!isGantt);

document.getElementById("dashboardView")
.classList.add("hidden");

}
</script>

</body>
</html>
