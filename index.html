<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LifeOS V183 Platinum</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-functions.js"></script>

<style>
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fadeIn { animation: fadeIn 0.5s ease forwards; }
    body { font-family: 'Heebo', sans-serif; background: radial-gradient(circle at top right, #1e1b4b, #0f172a 80%); background-attachment: fixed; color: white; text-align: right; min-height: 100vh; margin: 0; padding-top: env(safe-area-inset-top); overflow-x: hidden; }
    .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 36px; }
    .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(14px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 28px; transition: all .25s ease; cursor: pointer; position: relative; overflow: hidden; }
    .progress-bar { background: rgba(255,255,255,0.08); height: 8px; border-radius: 10px; overflow: hidden; width: 100%; position: relative; }
    .progress-fill { height: 100%; transition: width .8s ease; border-radius: 10px; }
    .modal-overlay { position: fixed; inset: 0; display: flex; align-items: flex-start; justify-content: center; background: rgba(10, 15, 28, 0.96); backdrop-filter: blur(22px); z-index: 1000; padding: 20px; overflow-y: auto; }
    input, select { background: rgba(255, 255, 255, 0.92) !important; border-radius: 16px !important; color: #0f172a !important; padding: 12px !important; width: 100%; border: none !important; }
    .nav-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 16px; color: white; transition: .2s; }
    ::-webkit-scrollbar { display: none; }
    .img-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    @media(min-width:768px) { .img-grid { grid-template-columns: repeat(3, 1fr); } }
    .img-container { position: relative; border-radius: 18px; overflow: hidden; background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.08); }
    .img-thumb { width: 100%; aspect-ratio: 1; object-fit: cover; }
    .del-img-btn { position: absolute; top: 6px; left: 6px; width: 26px; height: 26px; border-radius: 10px; background: rgba(0,0,0,0.55); color: #ff6b6b; display: flex; align-items: center; justify-content: center; font-size: 11px; opacity: 0; transition: 0.2s; }
</style>
</head>
<body class="p-4 flex justify-center items-start">

    <div id="authScreen" class="fixed inset-0 z-[2000] flex items-center justify-center bg-slate-950 p-6 text-center">
        <div class="glass-panel p-10 w-full max-w-sm">
            <h1 class="text-4xl font-black mb-10 italic">LifeOS</h1>
            <input type="email" id="emailInput" placeholder="אימייל" class="mb-3 ltr text-left">
            <input type="password" id="passInput" placeholder="סיסמה" class="mb-8 ltr text-left">
            <button onclick="handleAuth('login')" class="w-full py-4 bg-white text-slate-900 font-black rounded-2xl mb-3">כניסה</button>
            <button onclick="handleAuth('signup')" class="w-full py-4 border border-white/20 text-white font-bold rounded-2xl text-sm">יצירת משתמש</button>
        </div>
    </div>

    <div id="appScreen" class="hidden glass-panel w-full max-w-5xl h-[92vh] flex flex-col overflow-hidden relative shadow-2xl">
        <header class="p-6 flex justify-between items-center border-b border-white/5">
            <div class="flex gap-3 items-center">
                <h1 onclick="goHome()" class="text-2xl font-black italic cursor-pointer">LifeOS</h1>
                <button onclick="toggleGantt()" class="nav-btn"><i class="fas fa-calendar-alt"></i></button>
                <button onclick="openPartnerModal()" class="nav-btn text-purple-400"><i class="fas fa-fingerprint"></i></button>
            </div>
            <div class="flex gap-2 items-center">
                <button onclick="openAccessibilityModal()" class="flex items-center gap-1 text-white/70 text-[11px] bg-white/10 px-3 py-1.5 rounded-lg border border-white/10 hover:bg-white/20 transition">
                    <i class="fas fa-universal-access"></i> נגישות
                </button>
                <button onclick="toggleArchiveView()" id="archiveBtn" class="px-4 py-2 bg-white/5 rounded-xl text-[10px] font-bold border border-white/10">📦 ארכיון</button>
                <button onclick="toggleView()" id="viewBtn" class="px-4 py-2 glass-card text-[10px] font-black uppercase">דשבורד</button>
                <button onclick="auth.signOut()" class="text-white/30 p-2"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-6">
            <div id="projectsView" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 pb-24"></div>
            
            <div id="dashboardView" class="hidden space-y-6 pb-24">
                <div class="grid grid-cols-2 gap-4">
                    <div class="glass-card p-6 text-center"><span class="text-[10px] opacity-50 uppercase">תכנון כולל</span><div class="text-xl font-black" id="totalPlanned">₪0</div></div>
                    <div class="glass-card p-6 text-center border-r-4 border-purple-500"><span class="text-[10px] opacity-50 uppercase">נוצל בפועל</span><div class="text-xl font-black text-purple-400" id="totalSpent">₪0</div></div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="glass-card p-6 h-80 relative"><canvas id="mainChart"></canvas></div>
                    <div class="glass-card p-6 h-80 relative"><canvas id="categoryChart"></canvas></div>
                </div>
            </div>
            
            <div id="ganttView" class="hidden space-y-6 pb-24">
                <div id="ganttRows" class="space-y-4 bg-white/5 p-6 rounded-3xl"></div>
            </div>
        </main>
        
        <button onclick="openNewProjectModal()" class="absolute bottom-8 left-8 w-16 h-16 bg-white text-slate-900 rounded-2xl flex items-center justify-center shadow-2xl z-[100] hover:scale-110 transition-transform active:scale-95"><i class="fas fa-plus text-xl"></i></button>
    </div>

    <div id="newProjectModal" class="hidden modal-overlay">
        <div class="glass-panel p-8 w-full max-w-md mt-4 relative text-right">
            <button onclick="closeNewProjectModal()" class="absolute top-4 left-4 text-white/40 p-2"><i class="fas fa-times"></i></button>
            <h3 class="text-xl font-black mb-6 text-center italic">פרויקט חדש</h3>
            <div class="space-y-4">
                <input type="text" id="pTitleInp" placeholder="שם הפרויקט...">
                <div id="aiPreviewArea" class="hidden bg-white/5 p-4 rounded-2xl border border-white/5">
                    <div id="previewTasksContainer" class="max-h-[320px] overflow-y-auto space-y-2 mb-4"></div>
                    <div class="flex justify-between items-center text-xs font-bold border-t border-white/10 pt-3"><span class="text-indigo-400">₪<span id="totalLabel">0</span></span><button onclick="recalculateAI()" class="opacity-40">חשב מחדש ✨</button></div>
                </div>
                <select id="pCatInp"><option value="trip">✈️ טיול</option><option value="event">🎉 אירוע</option><option value="renovation">🏠 שיפוץ</option><option value="general">⚙️ כללי</option></select>
                <select id="budgetLevel"><option value="standard">💰 רגיל</option><option value="premium">✨ פרימיום</option></select>
                <div class="grid grid-cols-2 gap-2"><input type="date" id="pStartInp"><input type="date" id="pEndInp"></div>
                <button id="aiBtn" onclick="generateAIPreview()" class="w-full py-4 bg-gradient-to-r from-indigo-500 to-pink-500 text-white font-black rounded-2xl italic">✨ תכנן ב-AI</button>
                <input type="number" id="pBudgetInp" placeholder="תקציב">
                <button onclick="saveProject()" class="w-full py-4 bg-white text-black font-black rounded-2xl">שמור</button>
            </div>
        </div>
    </div>

    <div id="projectDetailModal" class="hidden modal-overlay text-right">
        <div class="glass-panel p-8 w-full max-w-2xl mt-4 relative mb-20">
            <button onclick="closeProjectDetail()" class="absolute top-6 left-6 text-white/40"><i class="fas fa-times"></i></button>
            <header class="mb-8">
                <h2 id="detailTitle" class="text-3xl font-black italic mb-4"></h2>
                <div id="projectUsers" class="flex -space-x-2 mb-4"></div>
                <div id="balanceCard" class="glass-card p-6 bg-white/10"></div>
            </header>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div>
                    <h4 class="text-sm font-bold mb-4 opacity-50 uppercase">משימות</h4>
                    <div class="flex gap-2 mb-4"><input type="text" id="taskName" placeholder="משימה" class="flex-1"><input type="number" id="taskPrice" placeholder="₪" class="w-24"><button onclick="addTask()" class="bg-white text-slate-900 px-4 rounded-xl font-bold">+</button></div>
                    <div id="tasksList" class="space-y-3 max-h-60 overflow-y-auto"></div>
                </div>
                <div>
                    <h4 class="text-sm font-bold mb-4 opacity-60 uppercase">מדיה</h4>
                    <div id="mediaGallery" class="img-grid mb-4"></div>
                    <button onclick="triggerUpload()" class="w-full py-8 border-2 border-dashed border-white/10 rounded-2xl bg-white/5"><i class="fas fa-camera opacity-70"></i></button>
                    <input type="file" id="imgUpload" class="hidden" accept="image/*" onchange="compressAndUpload(this)">
                </div>
            </div>
            <div class="mt-8 pt-6 border-t border-white/5 flex gap-2">
                <button onclick="shareViaWhatsApp()" class="nav-btn text-xs">WhatsApp</button>
                <button onclick="toggleArchiveStatus()" class="nav-btn text-xs">📦 ארכיון</button>
                <button onclick="deleteProjectPermanently()" class="nav-btn text-xs text-red-400">מחיקה</button>
            </div>
        </div>
    </div>

    <div id="partnerModal" class="hidden modal-overlay"><div class="glass-panel p-10 w-full max-w-sm mt-20 text-center"><input type="email" id="partnerEmail" placeholder="מייל השותף" class="mb-4 text-left ltr"><button onclick="savePartner()" class="w-full py-4 bg-white text-slate-900 font-black rounded-2xl">הוסף שותף</button><button onclick="closePartnerModal()" class="mt-4 opacity-50">סגור</button></div></div>
    <div id="accessibilityModal" class="hidden modal-overlay"><div class="glass-panel p-8 w-full max-w-lg mt-14"><h3>נגישות</h3><p>האתר מונגש ברמת AA.</p><button onclick="closeAccessibilityModal()">סגור</button></div></div>
    <div id="imageLightbox" class="hidden fixed inset-0 z-[3000] bg-black/90 flex items-center justify-center p-4" onclick="this.classList.add('hidden')"><img id="fullScreenImg" src="" class="max-w-full max-h-full rounded-3xl"></div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyB7U5xw_FMThsmM2hNMRnkdMYnD2cutH2s", authDomain: "project-manager-4702c.firebaseapp.com", projectId: "project-manager-4702c", storageBucket: "project-manager-4702c.firebasestorage.app", messagingSenderId: "941533299304", appId: "1:941533299304:web:92f8940e93a96b1f8b71dd" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();

        let projects = [], currentProjectId = null, userEmail = "", isDashboard = false, isGantt = false, isArchiveView = false, tempAiTasks = [];
        let myChart = null, categoryChart = null;

        function escapeHTML(s) { return s ? s.toString().replace(/[&<>"']/g, m => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#039;" }[m])) : ""; }

        auth.onAuthStateChanged(u => {
            if(u){ userEmail = u.email.toLowerCase(); document.getElementById('authScreen').classList.add('hidden'); document.getElementById('appScreen').classList.remove('hidden'); loadData(); }
            else { document.getElementById('authScreen').classList.remove('hidden'); document.getElementById('appScreen').classList.add('hidden'); }
        });

        function loadData(){
            if (!userEmail) return;
            db.collection('family_plans').where('collaborators', 'array-contains', userEmail).onSnapshot(s => {
                projects = s.docs.map(d => ({id:d.id, ...d.data()}));
                renderUI();
                if(isDashboard) renderDashboard();
                if(isGantt) renderGantt();
                if(currentProjectId) renderProjectInfo();
            });
        }

        function renderUI() {
            const container = document.getElementById('projectsView');
            if (!container) return;
            const filtered = projects.filter(p => isArchiveView ? p.isArchived : !p.isArchived);
            container.innerHTML = filtered.map(p => {
                const b = Number(p.budget || 0), s = (p.tasks || []).reduce((acc,t)=> t.done ? acc + Number(t.price || 0) : acc ,0), pr = b > 0 ? Math.round((s/b)*100) : 0;
                return `<div class="glass-card p-8 animate-fadeIn" onclick="openProjectDetail('${p.id}')">
                    <div class="flex justify-between items-start mb-6"><h3 class="text-2xl font-black italic text-white">${escapeHTML(p.title)}</h3><span class="text-[11px] opacity-40 font-bold">₪${(b - s).toLocaleString()}</span></div>
                    <div class="progress-bar"><div class="progress-fill bg-white" style="width: ${Math.min(pr, 100)}%"></div></div>
                    <div class="flex justify-between items-center mt-3"><span class="text-[10px] opacity-40 uppercase">ניצול</span><span class="text-[10px] opacity-60">${pr}%</span></div>
                </div>`;
            }).join('');
        }

        function toggleView(){ 
            isDashboard=!isDashboard; isGantt=false; 
            document.getElementById('projectsView').classList.toggle('hidden',isDashboard); 
            document.getElementById('dashboardView').classList.toggle('hidden',!isDashboard); 
            document.getElementById('ganttView').classList.add('hidden'); 
            if(isDashboard) setTimeout(renderDashboard, 100); 
        }
        function toggleGantt(){ 
            isGantt=!isGantt; isDashboard=false; 
            document.getElementById('projectsView').classList.toggle('hidden',isGantt); 
            document.getElementById('ganttView').classList.toggle('hidden',!isGantt); 
            document.getElementById('dashboardView').classList.add('hidden'); 
            if(isGantt) renderGantt(); 
        }
        function goHome(){ isDashboard=isGantt=false; document.getElementById('dashboardView').classList.add('hidden'); document.getElementById('ganttView').classList.add('hidden'); document.getElementById('projectsView').classList.remove('hidden'); }

        function renderDashboard() {
            let tp = 0, ts = 0; const pl = [], bd = [], sd = [], ct = {};
            projects.forEach(p => { if (p.isArchived) return; const b = Number(p.budget || 0), s = (p.tasks || []).reduce((a, t) => t.done ? a + Number(t.price || 0) : a, 0); tp += b; ts += s; pl.push(p.title); bd.push(b); sd.push(s); ct[p.category||'general'] = (ct[p.category||'general'] || 0) + s; });
            document.getElementById('totalPlanned').innerText = `₪${tp.toLocaleString()}`;
            document.getElementById('totalSpent').innerText = `₪${ts.toLocaleString()}`;
            if (myChart) myChart.destroy(); if (categoryChart) categoryChart.destroy();
            const common = { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: 'white' } } } };
            myChart = new Chart(document.getElementById('mainChart').getContext('2d'), { type: 'bar', data: { labels: pl, datasets: [ { label: 'תקציב', data: bd, backgroundColor: 'rgba(255,255,255,0.1)' }, { label: 'נוצל', data: sd, backgroundColor: '#818cf8' } ] }, options: common });
            categoryChart = new Chart(document.getElementById('categoryChart').getContext('2d'), { type: 'doughnut', data: { labels: Object.keys(ct), datasets: [{ data: Object.values(ct), backgroundColor: ['#818cf8', '#f472b6', '#fbbf24', '#34d399'] }] }, options: common });
        }

        function renderGantt(){
            document.getElementById('ganttRows').innerHTML = projects.filter(p=>!p.isArchived).map(p=>{
                const b = Number(p.budget || 0), s=(p.tasks||[]).reduce((a,t)=>t.done?a+Number(t.price||0):a,0), pr=b>0?Math.min(Math.round((s/b)*100),100):0;
                return `<div class="p-4 bg-white/5 rounded-2xl mb-3"><div class="flex justify-between mb-2"><b>${p.title}</b><span class="text-[10px] opacity-50">${p.startDate||''} - ${p.endDate||''}</span></div><div class="progress-bar"><div class="progress-fill bg-white" style="width: ${pr}%"></div></div></div>`;
            }).join("");
        }

        // שאר הפונקציות נשארות זהות
        async function handleAuth(t){ const e=document.getElementById('emailInput').value.trim(), p=document.getElementById('passInput').value; try { t==='login' ? await auth.signInWithEmailAndPassword(e,p) : await auth.createUserWithEmailAndPassword(e,p); } catch(err){alert(err.message)} }
        function openProjectDetail(id){ currentProjectId=id; document.getElementById('projectDetailModal').classList.remove('hidden'); renderProjectInfo(); }
        function closeProjectDetail(){ document.getElementById('projectDetailModal').classList.add('hidden'); currentProjectId=null; }
        function openNewProjectModal(){ document.getElementById('newProjectModal').classList.remove('hidden'); }
        function closeNewProjectModal(){ document.getElementById('newProjectModal').classList.add('hidden'); }
        function openPartnerModal(){ document.getElementById('partnerModal').classList.remove('hidden'); }
        function closePartnerModal(){ document.getElementById('partnerModal').classList.add('hidden'); }
        function openAccessibilityModal(){ document.getElementById('accessibilityModal').classList.remove('hidden'); }
        function closeAccessibilityModal(){ document.getElementById('accessibilityModal').classList.add('hidden'); }
        function toggleArchiveView(){ isArchiveView=!isArchiveView; renderUI(); }
        function triggerUpload(){ document.getElementById('imgUpload').click() }
        function openLightbox(src){ document.getElementById('fullScreenImg').src=src; document.getElementById('imageLightbox').classList.remove('hidden'); }

        async function saveProject(){
            const t = document.getElementById('pTitleInp').value; if(!t) return;
            await db.collection('family_plans').add({ title: t, category: document.getElementById('pCatInp').value, budget: Number(document.getElementById('pBudgetInp').value) || 0, startDate: document.getElementById('pStartInp').value || "", endDate: document.getElementById('pEndInp').value || "", collaborators: [userEmail], tasks: tempAiTasks, images: [], isArchived: false, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
            closeNewProjectModal();
        }

        function renderProjectInfo() {
            const p = projects.find(x => x.id === currentProjectId); if (!p) return;
            const b = Number(p.budget || 0), s = (p.tasks || []).reduce((acc, t) => t.done ? acc + Number(t.price || 0) : acc, 0), pr = b > 0 ? Math.min(Math.round((s / b) * 100), 100) : 0;
            document.getElementById('detailTitle').innerText = p.title;
            document.getElementById('projectUsers').innerHTML = (p.collaborators || []).map(e => `<div class="w-8 h-8 rounded-full bg-indigo-600 flex items-center justify-center text-[10px] font-bold border-2 border-[#0f172a]">${e.charAt(0).toUpperCase()}</div>`).join("");
            document.getElementById('balanceCard').innerHTML = `<div class="text-[10px] opacity-40 uppercase mb-1">יתרה</div><div class="text-4xl font-black italic mb-4">₪${(b-s).toLocaleString()}</div><div class="progress-bar"><div class="progress-fill bg-white" style="width:${pr}%"></div></div>`;
            document.getElementById('tasksList').innerHTML = (p.tasks || []).map((t, i) => `<div class="bg-white/5 p-4 rounded-2xl flex items-center justify-between mb-2"><div class="flex items-center gap-4"><input type="checkbox" ${t.done?'checked':''} onchange="toggleTaskDone(${i})"><b>${escapeHTML(t.name)}</b></div><span>₪${Number(t.price).toLocaleString()}</span></div>`).join("");
            document.getElementById('mediaGallery').innerHTML = (p.images || []).map((img, i) => `<div class="img-container"><img src="${img}" class="img-thumb" onclick="openLightbox('${img}')"></div>`).join("");
        }

        async function toggleTaskDone(i){ const p=projects.find(x=>x.id===currentProjectId); let t=[...p.tasks]; t[i].done=!t[i].done; await db.collection('family_plans').doc(currentProjectId).update({tasks:t}) }
        async function addTask(){ const n=document.getElementById('taskName').value.trim(), pr=Number(document.getElementById('taskPrice').value); if(!n) return; const p=projects.find(x=>x.id===currentProjectId); await db.collection('family_plans').doc(currentProjectId).update({tasks:[...(p.tasks||[]),{name:n,price:pr||0,done:false}]}); document.getElementById('taskName').value=""; document.getElementById('taskPrice').value="" }
    </script>
</body>
</html>
