<style>

body{
font-family:'Heebo',sans-serif;
background:radial-gradient(circle at top right,#1e1b4b,#0f172a 80%);
background-attachment:fixed;
color:white;
text-align:right;
min-height:100vh;
margin:0;
padding-top:env(safe-area-inset-top);
}

/* PANELS */

.glass-panel{
background:rgba(255,255,255,0.03);
backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,0.08);
border-radius:36px;
}

.glass-card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(14px);
border:1px solid rgba(255,255,255,0.08);
border-radius:28px;
transition:all .25s ease;
cursor:pointer;
}

.glass-card:hover{
transform:translateY(-3px);
box-shadow:0 10px 30px rgba(0,0,0,0.35);
}

/* MODAL */

.modal-overlay{
position:fixed;
inset:0;
display:flex;
align-items:flex-start;
justify-content:center;
background:rgba(10,15,28,0.96);
backdrop-filter:blur(22px);
z-index:1000;
padding:20px;
overflow-y:auto;
}

/* INPUTS */

input,select{
background:rgba(255,255,255,0.92)!important;
border-radius:16px!important;
color:#0f172a!important;
padding:12px!important;
width:100%;
font-size:16px!important;
border:none!important;
}

/* PROGRESS */

.progress-container{
position:relative;
width:100%;
margin-top:15px;
}

.progress-bar{
background:rgba(255,255,255,0.1);
height:8px;
border-radius:10px;
overflow:hidden;
}

.progress-fill{
height:100%;
transition:width .8s ease;
background:#fff;
box-shadow:0 0 10px rgba(255,255,255,0.3);
}

.progress-perc{
position:absolute;
left:0;
top:-16px;
font-size:10px;
font-weight:900;
opacity:.5;
}

/* NAV BUTTONS */

.nav-btn{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
padding:12px;
border-radius:16px;
color:white;
transition:.2s;
}

.nav-btn:hover{
background:rgba(255,255,255,0.12);
transform:scale(1.05);
}

/* AI BOX */

.ai-preview-box{
border:2px dashed rgba(99,102,241,0.4);
border-radius:24px;
background:rgba(99,102,241,0.05);
padding:16px;
margin:15px 0;
}

/* TASK */

.task-done{
opacity:.4;
text-decoration:line-through;
}

/* ===== MEDIA GALLERY ===== */

.img-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

@media(min-width:768px){
.img-grid{
grid-template-columns:repeat(3,1fr);
}
}

.img-container{
position:relative;
border-radius:18px;
overflow:hidden;
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.08);
transition:all .25s ease;
}

.img-container:hover{
transform:scale(1.04);
box-shadow:0 12px 28px rgba(0,0,0,0.4);
}

.img-thumb{
width:100%;
aspect-ratio:1;
object-fit:cover;
display:block;
}

/* delete button */

.del-img-btn{
position:absolute;
top:6px;
left:6px;
width:26px;
height:26px;
border-radius:10px;
background:rgba(0,0,0,0.55);
backdrop-filter:blur(6px);
display:flex;
align-items:center;
justify-content:center;
font-size:11px;
color:#ff6b6b;
opacity:0;
transition:all .2s ease;
}

.img-container:hover .del-img-btn{
opacity:1;
}

.del-img-btn:hover{
background:#ff3b3b;
color:white;
}

/* SCROLLBAR */

::-webkit-scrollbar{
display:none;
}

textarea{
overflow:hidden;
}

#previewTasksContainer::-webkit-scrollbar{
width:6px;
}

#previewTasksContainer::-webkit-scrollbar-thumb{
background:rgba(255,255,255,0.2);
border-radius:10px;
}
/* ===== FIX TASK WHITE BACKGROUND ===== */

#tasksList input{
background:transparent !important;
color:white !important;
font-weight:700;
padding:0 !important;
border:none !important;
}

#tasksList input:focus{
outline:none;
box-shadow:none;
}

#tasksList span{
opacity:0.6;
font-size:12px;
}
</style>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyB7U5xw_FMThsmM2hNMRnkdMYnD2cutH2s",
    authDomain: "project-manager-4702c.firebaseapp.com",
    projectId: "project-manager-4702c",
    storageBucket: "project-manager-4702c.firebasestorage.app",
    messagingSenderId: "941533299304",
    appId: "1:941533299304:web:92f8940e93a96b1f8b71dd"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let projects = [];
let currentProjectId = null;
let userEmail = "";
let isDashboard = false;
let isGantt = false;
let isArchiveView = false;
let tempAiTasks = [];

// --- Auth & Data Loading ---

auth.onAuthStateChanged(u => {
    if(u){
        userEmail = u.email.toLowerCase();
        document.getElementById('authScreen').classList.add('hidden');
        document.getElementById('appScreen').classList.remove('hidden');
        loadData();
    } else {
        document.getElementById('authScreen').classList.remove('hidden');
        document.getElementById('appScreen').classList.add('hidden');
    }
});

async function handleAuth(type){
    const email = document.getElementById('emailInput').value.trim();
    const pass = document.getElementById('passInput').value;
    if(!email || !pass) return alert("נא למלא אימייל וסיסמה");
    try {
        if(type === "login") await auth.signInWithEmailAndPassword(email, pass);
        else await auth.createUserWithEmailAndPassword(email, pass);
    } catch(err) { alert(err.message); }
}

function loadData(){
    db.collection('family_plans')
    .where('collaborators','array-contains',userEmail)
    .onSnapshot(s => {
        projects = s.docs.map(d => ({id:d.id, ...d.data()}));
        renderUI();
        if(currentProjectId) renderProjectInfo();
    });
}

// --- Project Actions ---

async function saveProject(){
    const title = document.getElementById('pTitleInp').value;
    if(!title) return alert("חובה שם פרויקט");
    await db.collection('family_plans').add({
        title,
        category: document.getElementById('pCatInp').value,
        budget: Number(document.getElementById('pBudgetInp').value),
        startDate: document.getElementById('pStartInp').value,
        endDate: document.getElementById('pEndInp').value,
        collaborators: [userEmail],
        tasks: tempAiTasks,
        images: [],
        isArchived: false,
        createdAt: new Date()
    });
    closeNewProjectModal();
}

async function savePartner() {

    const partnerEmail = document
        .getElementById('partnerEmail')
        .value
        .trim()
        .toLowerCase();

    if (!partnerEmail || !partnerEmail.includes('@')) {
        alert("הזן אימייל תקין");
        return;
    }

    if (!currentProjectId) {
        alert("בחר פרויקט קודם");
        return;
    }

    try {

        const p = projects.find(x => x.id === currentProjectId);

        if (!p) {
            alert("הפרויקט לא נמצא");
            return;
        }

        // יצירת עותק חדש של המערך
        let collabs = [...(p.collaborators || [])];

        // ודא שהמשתמש הנוכחי תמיד נמצא
        if (!collabs.includes(userEmail)) {
            collabs.push(userEmail);
        }

        if (collabs.includes(partnerEmail)) {
            alert("המשתמש כבר שותף!");
            return;
        }

        collabs.push(partnerEmail);

        await db
            .collection('family_plans')
            .doc(currentProjectId)
            .update({
                collaborators: collabs
            });

        alert("השותף נוסף בהצלחה!");

        // ניקוי שדה
        document.getElementById('partnerEmail').value = "";

        closePartnerModal();

    } catch (err) {

        console.error(err);
        alert("שגיאה בשיתוף: " + err.message);

    }
}
// --- UI Rendering ---

function renderUI(){
    const container = document.getElementById('projectsView');
    const filtered = projects.filter(p => isArchiveView ? p.isArchived : !p.isArchived);
    container.innerHTML = filtered.map(p => {
        const budget = Number(p.budget || 0), spent = (p.tasks || []).reduce((acc, t) => t.done ? acc + Number(t.price || 0) : acc, 0);
        const perc = budget > 0 ? Math.round((spent/budget)*100) : 0, remaining = budget - spent;
        return `<div class="glass-card p-8" onclick="openProjectDetail('${p.id}')">
            <div class="flex justify-between items-center mb-4"><h3 class="text-2xl font-black italic">${p.title}</h3><span class="text-xs opacity-40">₪${remaining.toLocaleString()}</span></div>
            <div class="progress-container"><div class="progress-perc">${perc}% נוצל</div><div class="progress-bar"><div class="progress-fill" style="width:${Math.min(perc,100)}%"></div></div></div>
        </div>`;
    }).join('');
}

function renderProjectInfo(){
    const p = projects.find(x => x.id === currentProjectId);
    if(!p) return;
    const budget = Number(p.budget || 0), spent = (p.tasks || []).reduce((acc, t) => t.done ? acc + Number(t.price || 0) : acc, 0);
    const remaining = budget - spent, perc = budget > 0 ? Math.round((spent/budget)*100) : 0;

  // כותרת הפרויקט
document.getElementById('detailTitle').innerText = p.title;

// משתמשים בפרויקט (avatars)
const users = p.collaborators || [];

document.getElementById("projectUsers").innerHTML =
users.map(email => {

const letter = email.charAt(0).toUpperCase();

return `
<div title="${email}"
class="w-7 h-7 rounded-full bg-indigo-500 flex items-center justify-center text-xs font-bold border border-white/20">
${letter}
</div>
`;

}).join("") +

`<button onclick="openPartnerModal()"
class="w-7 h-7 rounded-full bg-white/10 border border-white/20 text-[11px] hover:bg-white/20 transition">
+
</button>`;

// כרטיס התקציב
document.getElementById('balanceCard').innerHTML = `
<div class="flex justify-between items-center mb-1 px-2">
<span class="text-[10px] opacity-40 uppercase">יתרה לניצול</span>
<span class="text-[10px] opacity-40 font-bold">תקציב: ₪${budget.toLocaleString()}</span>
</div>

<div class="text-4xl font-black italic mb-3">
₪${remaining.toLocaleString()}
</div>

<div class="progress-container">
<div class="progress-bar">
<div class="progress-fill" style="width:${Math.min(perc,100)}%"></div>
</div>
</div>
`;

// Tasks
document.getElementById('tasksList').innerHTML =
(p.tasks || []).map((t, i) => `

<div class="bg-white/5 p-4 rounded-2xl flex items-center justify-between ${t.done ? 'task-done' : ''}">

// --- Task & Media Helpers ---

async function toggleTaskDone(i){
    const p = projects.find(x => x.id === currentProjectId);
    let tasks = [...p.tasks]; tasks[i].done = !tasks[i].done;
    await db.collection('family_plans').doc(currentProjectId).update({tasks});
}

async function editTaskName(i,val){
    const p = projects.find(x => x.id === currentProjectId);
    let tasks = [...p.tasks]; tasks[i].name = val;
    await db.collection('family_plans').doc(currentProjectId).update({tasks});
}

async function addTask(){
    const n = document.getElementById('taskName').value.trim(), pr = Number(document.getElementById('taskPrice').value);
    if(!n || !pr) return;
    const p = projects.find(x => x.id === currentProjectId);
    await db.collection('family_plans').doc(currentProjectId).update({ tasks: [...(p.tasks || []), { name: n, price: pr, done: false }] });
    document.getElementById('taskName').value = ""; document.getElementById('taskPrice').value = "";
}

async function deleteTask(i){
    const p = projects.find(x => x.id === currentProjectId);
    let tasks = [...p.tasks]; tasks.splice(i, 1);
    await db.collection('family_plans').doc(currentProjectId).update({tasks});
}

function triggerUpload() { document.getElementById('imgUpload').click(); }

async function compressAndUpload(input){
    if(!input.files[0] || !currentProjectId) return;
    const reader = new FileReader(); reader.readAsDataURL(input.files[0]);
    reader.onload = (e) => {
        const img = new Image(); img.src = e.target.result;
        img.onload = async () => {
            const canvas = document.createElement("canvas"), MAX = 800, scale = MAX / img.width;
            canvas.width = MAX; canvas.height = img.height * scale;
            canvas.getContext("2d").drawImage(img,0,0,canvas.width,canvas.height);
            const p = projects.find(x => x.id === currentProjectId);
            await db.collection("family_plans").doc(currentProjectId).update({ images:[...(p?.images || []), canvas.toDataURL("image/jpeg", 0.6)] });
            input.value = "";
        };
    };
}

async function deleteImage(event, index) {
    event.stopPropagation(); if(!confirm("למחוק?")) return;
    const p = projects.find(x => x.id === currentProjectId);
    let images = [...p.images]; images.splice(index, 1);
    await db.collection('family_plans').doc(currentProjectId).update({ images });
}

// --- AI Plan ---

async function generateAIPreview(){
    const title = document.getElementById('pTitleInp').value.trim();
    if(!title) return alert("כתוב מה תרצה לתכנן");
    const btn = document.getElementById('aiBtn');
    btn.disabled = true; btn.innerHTML = 'מנתח...';
    try {
        const gen = firebase.app().functions("us-central1").httpsCallable("generateAIPlan");
        const res = await gen({
            title, 
            category: document.getElementById('pCatInp').value,
            budgetLevel: document.getElementById('budgetLevel').value
        });
        tempAiTasks = (Array.isArray(res.data) ? res.data : (res.data?.tasks || [])).map(t => ({ name: t.title || t.name, price: Number(t.price) || 0, done: false }));
        renderAiPreviewList();
        document.getElementById('aiPreviewArea').classList.remove('hidden');
        document.getElementById('pBudgetInp').value = tempAiTasks.reduce((s,t) => s + t.price, 0);
    } catch(err) { alert("שגיאת AI: " + err.message); } finally { btn.disabled = false; btn.innerHTML = '✨ תכנן לי ב-AI'; }
}

function renderAiPreviewList(){
    const container = document.getElementById('previewTasksContainer');
    let total = 0;
    container.innerHTML = tempAiTasks.map((t,i) => {
        total += t.price;
        return `<div class="bg-white/5 p-3 rounded-xl mb-2 flex items-center gap-3">
            <button onclick="removeTempTask(${i})" class="text-red-400/50"><i class="fas fa-times-circle"></i></button>
            <input type="text" value="${t.name}" oninput="tempAiTasks[${i}].name=this.value" class="bg-transparent text-white font-bold flex-1 outline-none" />
            <div class="w-20 bg-white/10 text-white rounded-xl px-2 py-1 text-center font-bold">₪${t.price.toLocaleString()}</div>
        </div>`;
    }).join("");
    document.getElementById('totalLabel').innerText = `₪${total.toLocaleString()}`;
}

function removeTempTask(i){ tempAiTasks.splice(i,1); renderAiPreviewList(); }
