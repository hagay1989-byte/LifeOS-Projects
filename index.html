<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LifeOS V183 Platinum</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-functions.js"></script>

    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.5s ease forwards; }
        body { font-family: 'Heebo', sans-serif; background: radial-gradient(circle at top right, #1e1b4b, #0f172a 80%); background-attachment: fixed; color: white; text-align: right; min-height: 100vh; margin: 0; padding-top: env(safe-area-inset-top); }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 36px; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(14px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 28px; transition: all .25s ease; cursor: pointer; position: relative; overflow: hidden; }
        .modal-overlay { position: fixed; inset: 0; display: flex; align-items: flex-start; justify-content: center; background: rgba(10, 15, 28, 0.96); backdrop-filter: blur(22px); z-index: 1000; padding: 20px; overflow-y: auto; }
        input, select { background: rgba(255, 255, 255, 0.92) !important; border-radius: 16px !important; color: #0f172a !important; padding: 12px !important; width: 100%; border: none !important; }
        .progress-bar { background: rgba(255,255,255,0.08); height: 8px; border-radius: 10px; overflow: hidden; position: relative; width: 100%; }
        .progress-fill { height: 100%; transition: width .8s ease; background: #fff; border-radius: 10px; }
        .nav-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 16px; color: white; transition: .2s; }
        .img-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        @media(min-width:768px) { .img-grid { grid-template-columns: repeat(3, 1fr); } }
        .img-container { position: relative; border-radius: 18px; overflow: hidden; background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.08); }
        .img-thumb { width: 100%; aspect-ratio: 1; object-fit: cover; }
        .del-img-btn { position: absolute; top: 6px; left: 6px; width: 26px; height: 26px; border-radius: 10px; background: rgba(0,0,0,0.55); color: #ff6b6b; display: flex; align-items: center; justify-content: center; font-size: 11px; opacity: 0; transition: 0.2s; }
        .img-container:hover .del-img-btn { opacity: 1; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4 flex justify-center items-start">

    <div id="authScreen" class="fixed inset-0 z-[2000] flex items-center justify-center bg-slate-950 p-6 text-center">
        <div class="glass-panel p-10 w-full max-w-sm">
            <h1 class="text-4xl font-black mb-10 italic">LifeOS</h1>
            <input type="email" id="emailInput" placeholder="אימייל" class="mb-3 ltr text-left">
            <input type="password" id="passInput" placeholder="סיסמה" class="mb-8 ltr text-left">
            <button onclick="handleAuth('login')" class="w-full py-4 bg-white text-slate-900 font-black rounded-2xl mb-3">כניסה</button>
            <button onclick="handleAuth('signup')" class="w-full py-4 border border-white/20 text-white font-bold rounded-2xl text-sm">יצירת משתמש</button>
        </div>
    </div>

    <div id="appScreen" class="hidden glass-panel w-full max-w-5xl h-[92vh] flex flex-col overflow-hidden relative shadow-2xl">
        <header class="p-6 flex justify-between items-center border-b border-white/5">
            <div class="flex gap-3 items-center">
                <h1 onclick="goHome()" class="text-2xl font-black italic cursor-pointer">LifeOS</h1>
                <button onclick="toggleGantt()" class="nav-btn"><i class="fas fa-calendar-alt"></i></button>
                <button onclick="openPartnerModal()" class="nav-btn text-purple-400"><i class="fas fa-fingerprint"></i></button>
            </div>
            <div class="flex gap-2 items-center">
                <button onclick="openAccessibilityModal()" class="nav-btn text-[11px]"><i class="fas fa-universal-access"></i> נגישות</button>
                <button onclick="toggleArchiveView()" id="archiveBtn" class="nav-btn text-[10px]">📦 ארכיון</button>
                <button onclick="toggleView()" id="viewBtn" class="px-4 py-2 glass-card text-[10px] font-black uppercase">דשבורד</button>
                <button onclick="auth.signOut()" class="text-white/30 p-2 hover:text-white transition"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-6 text-right">
            <div id="projectsView" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 pb-24"></div>
            
            <div id="dashboardView" class="hidden space-y-6 pb-24">
                <div class="grid grid-cols-2 gap-4">
                    <div class="glass-card p-6 text-center"><span class="text-[10px] opacity-50 uppercase font-bold">תכנון כולל</span><div class="text-xl font-black" id="totalPlanned">₪0</div></div>
                    <div class="glass-card p-6 text-center border-r-4 border-purple-500"><span class="text-[10px] opacity-50 uppercase font-bold">נוצל בפועל</span><div class="text-xl font-black text-purple-400" id="totalSpent">₪0</div></div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="glass-card p-6 h-80 relative"><canvas id="mainChart"></canvas></div>
                    <div class="glass-card p-6 h-80 relative"><canvas id="categoryChart"></canvas></div>
                </div>
            </div>
            
            <div id="ganttView" class="hidden space-y-6 pb-24"><div id="ganttRows" class="space-y-4 bg-white/5 p-6 rounded-3xl"></div></div>
        </main>
        
        <button onclick="openNewProjectModal()" class="absolute bottom-8 left-8 w-16 h-16 bg-white text-slate-900 rounded-2xl flex items-center justify-center shadow-2xl z-40 hover:scale-110 transition-transform active:scale-95"><i class="fas fa-plus text-xl"></i></button>
    </div>

    <div id="newProjectModal" class="hidden modal-overlay text-right">
        <div class="glass-panel p-8 w-full max-w-md mt-4 relative">
            <button onclick="closeNewProjectModal()" class="absolute top-4 left-4 text-white/40 p-2"><i class="fas fa-times"></i></button>
            <h3 class="text-xl font-black mb-6 text-center italic">מה תרצה לתכנן היום?</h3>
            <div class="space-y-4">
                <input type="text" id="pTitleInp" placeholder="לדוגמה: טיול ליוון, יום הולדת, שיפוץ מטבח..." class="text-center">
                <div id="aiPreviewArea" class="hidden bg-white/5 p-4 rounded-2xl border border-white/5">
                    <div id="previewTasksContainer" class="max-h-[320px] overflow-y-auto space-y-2 mb-4"></div>
                    <div class="flex justify-between items-center text-xs font-bold pt-3 border-t border-white/10"><span class="text-indigo-400">₪<span id="totalLabel">0</span></span><button onclick="recalculateAI()" class="opacity-40">חשב מחדש ✨</button></div>
                </div>
                <select id="pCatInp"><option value="trip">✈️ טיול</option><option value="event">🎉 אירוע</option><option value="renovation">🏠 שיפוץ</option><option value="general">⚙️ כללי</option></select>
                <select id="budgetLevel"><option value="standard">💰 רגיל</option><option value="premium">✨ פרימיום</option></select>
                <div class="grid grid-cols-2 gap-2 text-[10px]"><input type="date" id="pStartInp"><input type="date" id="pEndInp"></div>
                <button id="aiBtn" onclick="generateAIPreview()" class="w-full py-4 bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 text-white font-black rounded-2xl shadow-xl italic">✨ תכנן לי ב-AI</button>
                <input type="number" id="pBudgetInp" placeholder="תקציב משוער">
                <button onclick="saveProject()" class="w-full py-4 bg-white text-black font-black rounded-2xl shadow-xl">שמור פרויקט</button>
            </div>
        </div>
    </div>

    <div id="projectDetailModal" class="hidden modal-overlay text-right">
        <div class="glass-panel p-8 w-full max-w-2xl mt-4 relative mb-20">
            <button onclick="closeProjectDetail()" class="absolute top-6 left-6 text-white/40 hover:text-white transition z-50"><i class="fas fa-times"></i></button>
            <header class="mb-8">
                <div class="flex justify-between items-start mb-4">
                    <h2 id="detailTitle" class="text-3xl font-black italic text-white"></h2>
                    <div id="projectUsers" class="flex -space-x-2 ml-8"></div>
                </div>
                <div id="balanceCard" class="glass-card p-6 bg-white/10"></div>
            </header>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div>
                    <h4 class="text-sm font-bold mb-4 opacity-50 uppercase">משימות ותשלומים</h4>
                    <div class="flex gap-2 mb-4">
                        <input type="text" id="taskName" placeholder="משימה" class="flex-1">
                        <input type="number" id="taskPrice" placeholder="₪" class="w-24">
                        <button onclick="addTask()" class="bg-white text-slate-900 px-4 rounded-xl font-bold">+</button>
                    </div>
                    <div id="tasksList" class="space-y-3 max-h-60 overflow-y-auto"></div>
                </div>
                <div>
                    <h4 class="text-sm font-bold mb-4 opacity-60 uppercase">מדיה ומסמכים</h4>
                    <div id="mediaGallery" class="img-grid mb-4"></div>
                    <button onclick="triggerUpload()" class="w-full py-8 border-2 border-dashed border-white/10 rounded-2xl bg-white/5 flex flex-col items-center justify-center gap-2"><i class="fas fa-camera text-xl opacity-70"></i><span class="text-sm opacity-70 font-bold">העלה תמונה</span></button>
                    <input type="file" id="imgUpload" class="hidden" accept="image/*" onchange="compressAndUpload(this)">
                </div>
            </div>
            <div class="mt-10 pt-8 border-t border-white/5 flex justify-between items-center">
                <button onclick="toggleProjectSettings()" class="text-white/30 text-xs">ניהול פרויקט ⚙️</button>
                <div id="projectSettings" class="hidden flex gap-2 flex-wrap mt-2">
                    <button onclick="shareViaWhatsApp()" class="px-3 py-2 bg-green-500/10 border border-green-400/20 text-green-400 text-xs font-bold rounded-xl italic flex items-center gap-1 hover:bg-green-500/20 transition-all"><i class="fab fa-whatsapp"></i> וואטסאפ</button>
                    <button onclick="exportToExcel()" class="px-3 py-2 bg-emerald-500/10 border border-emerald-400/20 text-emerald-300 text-xs font-bold rounded-xl italic"><i class="fas fa-file-excel"></i> אקסל</button>
                    <button onclick="toggleArchiveStatus()" class="px-3 py-2 bg-orange-500/10 border border-orange-400/20 text-orange-300 text-xs font-bold rounded-xl italic">📦 ארכיון</button>
                    <button onclick="deleteProjectPermanently()" class="px-3 py-2 bg-red-500/10 border border-red-400/20 text-red-400 text-xs font-bold rounded-xl italic">❌ מחיקה</button>
                </div>
            </div>
        </div>
    </div>

    <div id="accessibilityModal" class="hidden modal-overlay text-right">
        <div class="glass-panel p-8 w-full max-w-lg mt-14 relative border-t-4 border-indigo-500">
            <button onclick="closeAccessibilityModal()" class="absolute top-4 left-4 text-white/40 hover:text-white transition"><i class="fas fa-times"></i></button>
            <h3 class="text-2xl font-black italic mb-6">♿ הצהרת נגישות</h3>
            <div class="space-y-4 text-sm leading-relaxed opacity-90">
                <p>אתר <strong>LifeOS</strong> פועל להנגשת השירותים הדיגיטליים לכלל הציבור. האתר עומד בדרישות התקן הישראלי AA המבוסס על הנחיות WCAG 2.0.</p>
                <p>פניות בנושא נגישות: <a href="mailto:support@lifeos.app" class="font-bold text-indigo-400">support@lifeos.app</a></p>
            </div>
        </div>
    </div>

    <div id="partnerModal" class="hidden modal-overlay text-right">
        <div class="glass-panel p-10 w-full max-w-sm mt-20 text-center relative">
            <button onclick="closePartnerModal()" class="absolute top-4 left-4 text-white/40 hover:text-white transition-colors"><i class="fas fa-times"></i></button>
            <h3 class="text-xl font-black mb-6 italic text-white">הוספת שותף 🤝</h3>
            <input type="email" id="partnerEmail" placeholder="מייל השותף" class="mb-3 ltr text-left">
            <input type="tel" id="partnerPhone" placeholder="טלפון (אופציונלי)" class="mb-6 ltr text-left">
            <button onclick="savePartner()" class="w-full py-4 bg-white text-slate-900 font-black rounded-2xl shadow-xl hover:scale-[1.02] active:scale-95 transition-all">שמור במערכת</button>
            <button onclick="invitePartnerViaWhatsApp()" class="w-full mt-4 py-4 bg-green-500/10 border border-green-500/20 text-green-400 font-black rounded-2xl flex items-center justify-center gap-3 hover:bg-green-500/20 transition-all"><i class="fab fa-whatsapp text-lg"></i> שלח בוואטסאפ</button>
        </div>
    </div>

    <div id="imageLightbox" class="hidden fixed inset-0 z-[3000] bg-black/90 backdrop-blur-xl flex items-center justify-center p-4" onclick="this.classList.add('hidden')">
        <img id="fullScreenImg" src="" class="max-w-full max-h-full rounded-3xl shadow-2xl object-contain">
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyB7U5xw_FMThsmM2hNMRnkdMYnD2cutH2s", authDomain: "project-manager-4702c.firebaseapp.com", projectId: "project-manager-4702c", storageBucket: "project-manager-4702c.firebasestorage.app", messagingSenderId: "941533299304", appId: "1:941533299304:web:92f8940e93a96b1f8b71dd" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();

        let projects = [], currentProjectId = null, userEmail = "", isDashboard = false, isGantt = false, isArchiveView = false, tempAiTasks = [];
        let myChart = null, categoryChart = null;

        function escapeHTML(s) { return s ? s.toString().replace(/[&<>"']/g, m => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#039;" }[m])) : ""; }

        auth.onAuthStateChanged(u => {
            if(u){ userEmail = u.email.toLowerCase(); document.getElementById('authScreen').classList.add('hidden'); document.getElementById('appScreen').classList.remove('hidden'); loadData(); }
            else { document.getElementById('authScreen').classList.remove('hidden'); document.getElementById('appScreen').classList.add('hidden'); }
        });

        function loadData(){
            if (!userEmail) return;
            db.collection('family_plans').where('collaborators', 'array-contains', userEmail).onSnapshot(s => {
                projects = s.docs.map(d => ({id:d.id, ...d.data()}));
                renderUI();
                if(isDashboard) setTimeout(renderDashboard, 100);
                if(isGantt) renderGantt();
                if(currentProjectId) renderProjectInfo();
            });
        }

        function goHome(){ isDashboard=isGantt=false; document.querySelectorAll('.modal-overlay').forEach(m=>m.classList.add('hidden')); document.getElementById('dashboardView').classList.add('hidden'); document.getElementById('ganttView').classList.add('hidden'); document.getElementById('projectsView').classList.remove('hidden'); }
        function toggleView(){ isDashboard=!isDashboard; isGantt=false; document.getElementById('projectsView').classList.toggle('hidden',isDashboard); document.getElementById('dashboardView').classList.toggle('hidden',!isDashboard); document.getElementById('ganttView').classList.add('hidden'); if(isDashboard) setTimeout(renderDashboard, 100); }
        function toggleGantt(){ isGantt=!isGantt; isDashboard=false; document.getElementById('projectsView').classList.toggle('hidden',isGantt); document.getElementById('ganttView').classList.toggle('hidden',!isGantt); document.getElementById('dashboardView').classList.add('hidden'); if(isGantt) renderGantt(); }
        
        function openAccessibilityModal() { document.getElementById('accessibilityModal').classList.remove('hidden'); }
        function closeAccessibilityModal() { document.getElementById('accessibilityModal').classList.add('hidden'); }
        function openNewProjectModal(){ document.getElementById('newProjectModal').classList.remove('hidden'); }
        function closeNewProjectModal(){ document.getElementById('newProjectModal').classList.add('hidden'); tempAiTasks=[]; document.getElementById('aiPreviewArea').classList.add('hidden'); }
        function openProjectDetail(id){ currentProjectId=id; document.getElementById('projectDetailModal').classList.remove('hidden'); renderProjectInfo(); }
        function closeProjectDetail(){ document.getElementById('projectDetailModal').classList.add('hidden'); currentProjectId=null; }
        function openPartnerModal(){ document.getElementById('partnerModal').classList.remove('hidden'); }
        function closePartnerModal(){ document.getElementById('partnerModal').classList.add('hidden'); }
        function toggleProjectSettings(){ document.getElementById('projectSettings').classList.toggle('hidden'); }
        function toggleArchiveView(){ isArchiveView=!isArchiveView; renderUI(); }

        function renderUI() {
            const container = document.getElementById('projectsView');
            if (!container) return;
            const filtered = projects.filter(p => isArchiveView ? p.isArchived : !p.isArchived);
            if (filtered.length === 0 && !isArchiveView) {
                container.innerHTML = `<div class="col-span-full flex flex-col items-center justify-center py-20 text-center animate-fadeIn"><div class="w-20 h-20 bg-indigo-500/10 rounded-full flex items-center justify-center mb-6"><i class="fas fa-wand-magic-sparkles text-2xl text-indigo-400"></i></div><h2 class="text-2xl font-black italic">LifeOS מוכנה.</h2><p class="opacity-40 text-sm mt-2">צור פרויקט ראשון בעזרת ה-AI</p></div>`;
                return;
            }
            container.innerHTML = filtered.map(p => {
                const b = Number(p.budget || 0), s = (p.tasks || []).reduce((acc,t)=> t.done ? acc + Number(t.price || 0) : acc ,0), pr = b > 0 ? Math.round((s/b)*100) : 0;
                return `<div class="glass-card p-8 group transition-all cursor-pointer animate-fadeIn" onclick="openProjectDetail('${p.id}')"><div class="flex justify-between items-center mb-4"><h3 class="text-2xl font-black italic">${escapeHTML(p.title)}</h3><span class="text-xs opacity-40 font-bold">₪${(b-s).toLocaleString()} יתרה</span></div><div class="progress-bar"><div class="progress-fill" style="width:${Math.min(pr,100)}%"></div></div><div class="text-[10px] opacity-40 mt-2 font-bold uppercase">ניצול: ${pr}%</div></div>`;
            }).join('');
        }

        function renderDashboard() {
            let tp = 0, ts = 0; const pl = [], bd = [], sd = [], ct = {};
            projects.forEach(p => { if (p.isArchived) return; const b = Number(p.budget || 0), s = (p.tasks || []).reduce((a, t) => t.done ? a + Number(t.price || 0) : a, 0); tp += b; ts += s; pl.push(p.title); bd.push(b); sd.push(s); ct[p.category||'general'] = (ct[p.category||'general'] || 0) + s; });
            document.getElementById('totalPlanned').innerText = `₪${tp.toLocaleString()}`;
            document.getElementById('totalSpent').innerText = `₪${ts.toLocaleString()}`;
            if (myChart) myChart.destroy(); if (categoryChart) categoryChart.destroy();
            const common = { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: 'white' } } } };
            const ctx1 = document.getElementById('mainChart').getContext('2d');
            const ctx2 = document.getElementById('categoryChart').getContext('2d');
            myChart = new Chart(ctx1, { type: 'bar', data: { labels: pl, datasets: [ { label: 'תקציב', data: bd, backgroundColor: 'rgba(255,255,255,0.1)' }, { label: 'נוצל', data: sd, backgroundColor: '#818cf8' } ] }, options: common });
            categoryChart = new Chart(ctx2, { type: 'doughnut', data: { labels: Object.keys(ct), datasets: [{ data: Object.values(ct), backgroundColor: ['#818cf8', '#f472b6', '#fbbf24', '#34d399'] }] }, options: common });
        }

        function renderGantt(){
            document.getElementById('ganttRows').innerHTML = projects.filter(p=>!p.isArchived).map(p=>{
                const b = Number(p.budget || 0), s=(p.tasks||[]).reduce((a,t)=>t.done?a+Number(t.price||0):a,0), pr=b>0 ? Math.min(Math.round((s/b)*100),100) : 0;
                return `<div class="p-4 bg-white/5 rounded-2xl mb-3 text-right animate-fadeIn"><div class="flex justify-between mb-2"><b>${p.title}</b><span class="text-[10px] opacity-50 font-bold">${p.startDate||''} - ${p.endDate||''}</span></div><div class="progress-bar"><div class="progress-fill" style="width: ${pr}%"></div></div></div>`;
            }).join("");
        }

        function renderProjectInfo() {
            const p = projects.find(x => x.id === currentProjectId); if (!p) return;
            const b = Number(p.budget || 0), s = (p.tasks || []).reduce((acc, t) => t.done ? acc + Number(t.price || 0) : acc, 0), pr = b > 0 ? Math.min(Math.round((s / b) * 100), 100) : 0;
            document.getElementById('detailTitle').innerText = p.title;
            const collaborators = p.collaborators || [];
            document.getElementById('projectUsers').innerHTML = collaborators.map(email => `<div title="${email}" class="w-8 h-8 rounded-full bg-indigo-600 flex items-center justify-center text-[10px] font-bold border-2 border-[#0f172a] shadow-md">${email.charAt(0).toUpperCase()}</div>`).join("") + `<button onclick="openPartnerModal()" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20 transition ml-2"><i class="fas fa-plus text-[10px]"></i></button>`;
            document.getElementById('balanceCard').innerHTML = `<div class="text-[10px] opacity-40 uppercase font-black mb-1">יתרה לניצול</div><div class="text-4xl font-black italic mb-4">₪${(b-s).toLocaleString()}</div><div class="progress-bar"><div class="progress-fill" style="width:${pr}%"></div></div><div class="flex justify-between text-[9px] opacity-30 mt-2 font-bold"><span>נוצל: ${pr}%</span><span>תקציב: ₪${b.toLocaleString()}</span></div>`;
            document.getElementById('tasksList').innerHTML = (p.tasks || []).map((t, i) => `<div class="bg-white/5 p-4 rounded-2xl flex items-center justify-between mb-2 ${t.done?'opacity-40':''}"><div class="flex items-center gap-4 flex-1"><input type="checkbox" ${t.done?'checked':''} onchange="toggleTaskDone(${i})" class="w-5 h-5 accent-indigo-500"><div class="flex flex-col"><input type="text" value="${escapeHTML(t.name)}" oninput="editTaskName(${i}, this.value)" class="bg-transparent text-white font-bold outline-none border-none p-0"></div></div><span class="text-[12px] font-bold">₪${Number(t.price).toLocaleString()}</span><button onclick="deleteTask(${i})" class="text-red-400 opacity-20 hover:opacity-100 transition mr-2"><i class="fas fa-trash-alt text-xs"></i></button></div>`).join("") || `<div class="text-center py-8 opacity-20 text-xs italic">אין משימות...</div>`;
            document.getElementById('mediaGallery').innerHTML = (p.images || []).map((img, i) => `<div class="img-container relative group"><button onclick="deleteImage(event, ${i})" class="del-img-btn z-10"><i class="fas fa-trash"></i></button><img src="${img}" class="img-thumb cursor-zoom-in" onclick="openLightbox('${img}')"></div>`).join("");
        }

        async function handleAuth(t){ const e=document.getElementById('emailInput').value.trim(), p=document.getElementById('passInput').value; try { t==='login' ? await auth.signInWithEmailAndPassword(e,p) : await auth.createUserWithEmailAndPassword(e,p); } catch(err){alert(err.message)} }
        async function toggleTaskDone(i){ const p=projects.find(x=>x.id===currentProjectId); let t=[...p.tasks]; t[i].done=!t[i].done; await db.collection('family_plans').doc(currentProjectId).update({tasks:t}) }
        async function editTaskName(i,v){ const p=projects.find(x=>x.id===currentProjectId); let t=[...p.tasks]; t[i].name=v; await db.collection('family_plans').doc(currentProjectId).update({tasks:t}) }
        async function deleteTask(i){ const p=projects.find(x=>x.id===currentProjectId); let t=[...p.tasks]; t.splice(i,1); await db.collection('family_plans').doc(currentProjectId).update({tasks:t}) }
        async function addTask(){ const n=document.getElementById('taskName').value.trim(), pr=Number(document.getElementById('taskPrice').value); if(!n) return; const p=projects.find(x=>x.id===currentProjectId); await db.collection('family_plans').doc(currentProjectId).update({tasks:[...(p.tasks||[]),{name:n,price:pr||0,done:false}]}); document.getElementById('taskName').value=""; document.getElementById('taskPrice').value="" }
        function triggerUpload(){ document.getElementById('imgUpload').click() }
        function openLightbox(src){ document.getElementById('fullScreenImg').src=src; document.getElementById('imageLightbox').classList.remove('hidden'); }
        async function deleteImage(e, i){ e.stopPropagation(); if(confirm("למחוק?")){ const p = projects.find(x => x.id === currentProjectId); let im = [...(p.images || [])]; im.splice(i, 1); await db.collection('family_plans').doc(currentProjectId).update({images: im}); } }
        async function deleteProjectPermanently(){ if(confirm("מחיקה סופית?")){ await db.collection('family_plans').doc(currentProjectId).delete(); closeProjectDetail(); } }
        async function toggleArchiveStatus(){ const p=projects.find(x=>x.id===currentProjectId); await db.collection('family_plans').doc(currentProjectId).update({isArchived:!p.isArchived}); closeProjectDetail(); }
        async function compressAndUpload(i){ if(!i.files[0]||!currentProjectId) return; const r = new FileReader(); r.readAsDataURL(i.files[0]); r.onload = e => { const img = new Image(); img.src = e.target.result; img.onload = async () => { const c = document.createElement("canvas"), m = 800, s = m/img.width; c.width = m; c.height = img.height*s; c.getContext("2d").drawImage(img, 0, 0, c.width, c.height); const base64 = c.toDataURL("image/jpeg", 0.6); const p = projects.find(x => x.id === currentProjectId); await db.collection("family_plans").doc(currentProjectId).update({ images: [...(p?.images || []), base64] }); if(confirm("לנתח קבלה עם AI? ✨")) analyzeImageWithAI(base64); }; }; }
        async function saveProject(){ const t = document.getElementById('pTitleInp').value; if(!t) return; await db.collection('family_plans').add({ title: t, category: document.getElementById('pCatInp').value, budget: Number(document.getElementById('pBudgetInp').value) || 0, startDate: document.getElementById('pStartInp').value || "", endDate: document.getElementById('pEndInp').value || "", collaborators: [userEmail], tasks: tempAiTasks, images: [], isArchived: false, createdAt: firebase.firestore.FieldValue.serverTimestamp() }); closeNewProjectModal(); }
        async function generateAIPreview(){ const t=document.getElementById('pTitleInp').value.trim(); if(!t) return; const b=document.getElementById('aiBtn'); b.disabled=true; b.innerHTML="ה-AI מתכנן..."; try { const g = firebase.app().functions("us-central1").httpsCallable("generateAIPlan"); const r = await g({ title: t, category: document.getElementById('pCatInp').value, budgetLevel: document.getElementById('budgetLevel').value }); tempAiTasks = (r.data.tasks || []).map(x => ({ name: x.title || x.name, price: Number(x.price) || 0, done: false })); renderAiPreviewList(); document.getElementById('aiPreviewArea').classList.remove('hidden'); document.getElementById('pBudgetInp').value = tempAiTasks.reduce((s, x) => s + x.price, 0); } catch(err){ alert("AI Error"); } finally { b.disabled=false; b.innerHTML='תכנן לי ב-AI ✨'; } }
        function renderAiPreviewList(){ const c=document.getElementById('previewTasksContainer'); let t=0; c.innerHTML=tempAiTasks.map((x,i)=>{t+=x.price;return`<div class="bg-white/5 p-3 rounded-xl mb-2 flex items-center justify-between"><span>${escapeHTML(x.name)}</span><b>₪${x.price.toLocaleString()}</b></div>`}).join(""); document.getElementById('totalLabel').innerText=`₪${t.toLocaleString()}`; }
async function savePartner() {
    const input = document.getElementById('partnerEmail');
    const email = input.value.trim().toLowerCase();
    
    if(!email || !currentProjectId) return alert("אנא הזן מייל תקין");
    
    try {
        const p = projects.find(x => x.id === currentProjectId);
        if(!p) return;
        
        let collaborators = [...(p.collaborators || [])];
        
        if(!collaborators.includes(email)) {
            collaborators.push(email); 
            
            // עדכון ה-Database בזמן אמת
            await db.collection('family_plans').doc(currentProjectId).update({
                collaborators: collaborators
            });
            
            alert(`הפרויקט שותף בהצלחה עם ${email}!`);
            input.value = "";
            closePartnerModal();
        } else {
            alert("המשתמש כבר מוגדר כשותף בפרויקט זה.");
        }
    } catch(err) {
        console.error("Error adding partner:", err);
        alert("שגיאה בהוספת שותף. וודא שיש לך חיבור יציב.");
    }
}

// שליחת הודעה בוואטסאפ לשותף החדש
async function invitePartnerViaWhatsApp() {
    const email = document.getElementById('partnerEmail').value.trim().toLowerCase();
    const phoneInput = document.getElementById('partnerPhone').value.trim();
    const phone = phoneInput.replace(/\D/g, ''); 
    
    if(!email) return alert("אנא הזן מייל כדי שהשותף יוכל להיכנס");
    if(!currentProjectId) return;

    const p = projects.find(x => x.id === currentProjectId);
    const msg = encodeURIComponent(
        `היי! צירפתי אותך לפרויקט "${p.title}" ב-LifeOS. 🤝\n` +
        `תירשם כאן עם המייל שלך (${email}) כדי שתוכל לראות הכל בלייב:\n${window.location.origin}`
    );

    let url = "https://wa.me/";
    if (phone) {
        const formattedPhone = phone.startsWith('0') ? '972' + phone.substring(1) : phone;
        url += formattedPhone;
    }
    window.open(`${url}?text=${msg}`, '_blank');
}
