<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LifeOS V183</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-functions.js"></script>

    <style>
        body { font-family: 'Heebo', sans-serif; background: radial-gradient(circle at top right, #1e1b4b, #0f172a 80%); background-attachment: fixed; color: white; text-align: right; min-height: 100vh; margin: 0; padding-top: env(safe-area-inset-top); }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 36px; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(14px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 28px; transition: all .25s ease; cursor: pointer; }
        .modal-overlay { position: fixed; inset: 0; display: flex; align-items: flex-start; justify-content: center; background: rgba(10, 15, 28, 0.96); backdrop-filter: blur(22px); z-index: 1000; padding: 20px; overflow-y: auto; }
        input, select { background: rgba(255, 255, 255, 0.92) !important; border-radius: 16px !important; color: #0f172a !important; padding: 12px !important; width: 100%; font-size: 16px !important; border: none !important; }
        .progress-container { position: relative; width: 100%; margin-top: 15px; }
        .progress-bar { background: rgba(255,255,255,0.1); height: 8px; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; transition: width .8s ease; background: #fff; box-shadow: 0 0 10px rgba(255,255,255,0.3); }
        .progress-perc { position: absolute; left: 0; top: -16px; font-size: 10px; font-weight: 900; opacity: .5; }
        .nav-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 16px; color: white; transition: .2s; }
        .ai-preview-box { border: 2px dashed rgba(99,102,241,0.4); border-radius: 24px; background: rgba(99,102,241,0.05); padding: 16px; margin: 15px 0; }
        .task-done { opacity: .4; text-decoration: line-through; }
        .img-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        @media(min-width:768px) { .img-grid { grid-template-columns: repeat(3, 1fr); } }
        .img-container { position: relative; border-radius: 18px; overflow: hidden; background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.08); transition: all .25s ease; }
        .img-thumb { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }
        .del-img-btn { position: absolute; top: 6px; left: 6px; width: 26px; height: 26px; border-radius: 10px; background: rgba(0,0,0,0.55); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; font-size: 11px; color: #ff6b6b; opacity: 0; transition: all .2s ease; }
        .img-container:hover .del-img-btn { opacity: 1; }
        ::-webkit-scrollbar { display: none; }
        #tasksList input { background: transparent !important; color: white !important; font-weight: 700; padding: 0 !important; border: none !important; }
    </style>
</head>
<body class="p-4 flex justify-center items-start">

    <div id="authScreen" class="fixed inset-0 z-[2000] flex items-center justify-center bg-slate-950 p-6 text-center">
        <div class="glass-panel p-10 w-full max-w-sm">
            <h1 class="text-4xl font-black mb-10 italic">LifeOS</h1>
            <input type="email" id="emailInput" placeholder="אימייל" class="mb-3 ltr text-left">
            <input type="password" id="passInput" placeholder="סיסמה" class="mb-8 ltr text-left">
            <button onclick="handleAuth('login')" class="w-full py-4 bg-white text-slate-900 font-black rounded-2xl mb-3">כניסה</button>
            <button onclick="handleAuth('signup')" class="w-full py-4 border border-white/20 text-white font-bold rounded-2xl text-sm">יצירת משתמש</button>
        </div>
    </div>

    <div id="appScreen" class="hidden glass-panel w-full max-w-5xl h-[92vh] flex flex-col overflow-hidden relative shadow-2xl">
        <header class="p-6 flex justify-between items-center border-b border-white/5">
            <div class="flex gap-3 items-center">
                <h1 onclick="goHome()" class="text-2xl font-black italic cursor-pointer">LifeOS</h1>
                <button onclick="toggleGantt()" class="nav-btn"><i class="fas fa-calendar-alt"></i></button>
                <button onclick="openPartnerModal()" class="nav-btn text-purple-400"><i class="fas fa-fingerprint"></i></button>
            </div>
            <div class="flex gap-2">
                <button onclick="toggleArchiveView()" id="archiveBtn" class="px-4 py-2 bg-white/5 rounded-xl text-[10px] font-bold border border-white/10">📦 ארכיון</button>
                <button onclick="toggleView()" id="viewBtn" class="px-4 py-2 glass-card text-[9px] font-black uppercase">דשבורד</button>
                <button onclick="auth.signOut()" class="text-white/20 p-2"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-6">
            <div id="projectsView" class="grid grid-cols-1 md:grid-cols-2 gap-6 pb-24"></div>
            <div id="dashboardView" class="hidden space-y-6 pb-24">
                <div class="grid grid-cols-2 gap-4">
                    <div class="glass-card p-6 text-center">
                        <span class="text-[10px] opacity-50 uppercase block mb-1">תכנון כולל</span>
                        <div class="text-xl font-black" id="totalPlanned">₪0</div>
                    </div>
                    <div class="glass-card p-6 text-center border-r-4 border-purple-500">
                        <span class="text-[10px] opacity-50 uppercase block mb-1">נוצל בפועל</span>
                        <div class="text-xl font-black text-purple-400" id="totalSpent">₪0</div>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="glass-card p-6 h-80">
                        <h4 class="text-xs font-bold mb-4 opacity-40 uppercase tracking-widest text-center">השוואת פרויקטים</h4>
                        <div class="h-64 relative"><canvas id="mainChart"></canvas></div>
                    </div>
                    <div class="glass-card p-6 h-80">
                        <h4 class="text-xs font-bold mb-4 opacity-40 uppercase tracking-widest text-center">התפלגות לפי קטגוריה</h4>
                        <div class="h-64 relative"><canvas id="categoryChart"></canvas></div>
                    </div>
                </div>
            </div>
            <div id="ganttView" class="hidden space-y-6 pb-24"><div id="ganttRows" class="space-y-4 bg-white/5 p-6 rounded-3xl"></div></div>
        </main>
        <button onclick="openNewProjectModal()" class="absolute bottom-8 left-8 w-16 h-16 bg-white text-slate-900 rounded-2xl flex items-center justify-center shadow-2xl z-40"><i class="fas fa-plus text-xl"></i></button>
    </div>

    <div id="newProjectModal" class="hidden modal-overlay text-right">
        <div class="glass-panel p-8 w-full max-w-md mt-4 relative text-right">
            <button onclick="closeNewProjectModal()" class="absolute top-4 left-4 text-white/40 p-2"><i class="fas fa-times"></i></button>
            <h3 class="text-xl font-black mb-6 text-center italic">מה תרצה לתכנן היום?</h3>
            <div class="space-y-4">
                <input type="text" id="pTitleInp" placeholder="לדוגמה: טיול ליוון, שיפוץ מטבח..." class="text-center">
                <div id="aiPreviewArea" class="hidden ai-preview-box">
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-indigo-400 font-bold text-xs">✨ הצעת תכנון מה-AI</span>
                        <button onclick="recalculateAI()" class="text-[10px] bg-indigo-500/20 text-indigo-300 px-3 py-1 rounded-lg">חשב מחדש</button>
                    </div>
                    <div id="previewTasksContainer" class="max-h-[320px] overflow-y-auto pr-2 space-y-2"></div>
                    <div class="flex justify-between items-center mt-3 pt-3 border-t border-white/10">
                        <span class="text-indigo-400 font-bold text-xs">סה״כ הצעה: <span id="totalLabel">₪0</span></span>
                    </div>
                </div>
                <select id="pCatInp"><option value="trip">✈️ טיול</option><option value="event">🎉 אירוע</option><option value="renovation">🏠 שיפוץ</option><option value="general">⚙️ כללי</option></select>
                <select id="budgetLevel"><option value="economy">💸 חסכוני</option><option value="standard" selected>💰 רגיל</option><option value="premium">✨ פרימיום</option></select>
                
                <div class="space-y-3">
                    <div class="flex flex-col gap-1">
                        <label class="text-[11px] opacity-60 px-1 font-bold">📅 תאריך התחלה</label>
                        <input type="date" id="pStartInp">
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="text-[11px] opacity-60 px-1 font-bold">📅 תאריך סיום</label>
                        <input type="date" id="pEndInp">
                    </div>
                </div>

                <button id="aiBtn" onclick="generateAIPreview()" class="w-full py-4 bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 text-white font-black rounded-2xl shadow-xl">✨ תכנן לי ב-AI</button>
                <input type="number" id="pBudgetInp" placeholder="תקציב משוער">
                <button onclick="saveProject()" class="w-full py-4 bg-white text-black font-black rounded-2xl shadow-xl">שמור פרויקט</button>
            </div>
        </div>
    </div>

    <div id="projectDetailModal" class="hidden modal-overlay text-right">
        <div class="glass-panel p-8 w-full max-w-2xl mt-4 relative mb-20 text-right">
            <button onclick="closeProjectDetail()" class="absolute top-4 left-4 text-white/40 p-2"><i class="fas fa-times"></i></button>
            <header class="mb-8">
                <div class="flex justify-between items-center mb-2">
                    <h2 id="detailTitle" class="text-3xl font-black italic"></h2>
                    <div id="projectUsers" class="flex -space-x-2 items-center ml-10 mt-1"></div>
                </div>
                <div id="balanceCard" class="glass-card p-6 bg-white/10"></div>
            </header>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div>
                    <h4 class="text-sm font-bold mb-4 opacity-50 uppercase tracking-widest">משימות ותשלומים</h4>
                    <div class="flex gap-2 mb-4">
                        <input type="text" id="taskName" placeholder="משימה" class="flex-1">
                        <input type="number" id="taskPrice" placeholder="₪" class="w-24">
                        <button onclick="addTask()" class="bg-white text-slate-900 px-4 rounded-xl font-bold">+</button>
                    </div>
                    <div id="tasksList" class="space-y-3 max-h-60 overflow-y-auto"></div>
                </div>
                <div>
                    <h4 class="text-sm font-bold mb-4 opacity-60 uppercase tracking-widest">מדיה ומסמכים</h4>
                    <div id="mediaGallery" class="img-grid mb-4"></div>
                    <button onclick="triggerUpload()" class="w-full py-8 border-2 border-dashed border-white/10 rounded-2xl bg-white/5 flex flex-col items-center justify-center gap-2">
                        <i class="fas fa-camera text-xl opacity-70"></i>
                        <span class="text-sm opacity-70 font-bold">העלה תמונה</span>
                    </button>
                    <input type="file" id="imgUpload" class="hidden" accept="image/*" onchange="compressAndUpload(this)">
                </div>
            </div>
            <div class="mt-10 pt-8 border-t border-white/5 flex justify-between items-center">
                <button onclick="toggleProjectSettings()" class="text-white/30 text-xs">ניהול פרויקט ⚙️</button>
                <div id="projectSettings" class="hidden flex gap-2 flex-wrap mt-2">
                    <button onclick="exportToExcel()" class="px-3 py-2 bg-emerald-500/10 border border-emerald-400/20 text-emerald-300 text-xs font-bold rounded-xl italic">📊 אקסל</button>
                    <button onclick="toggleArchiveStatus()" class="px-3 py-2 bg-orange-500/10 border border-orange-400/20 text-orange-300 text-xs font-bold rounded-xl italic">📦 ארכיון</button>
                    <button onclick="deleteProjectPermanently()" class="px-3 py-2 bg-red-500/10 border border-red-400/20 text-red-400 text-xs font-bold rounded-xl italic">❌ מחיקה</button>
                </div>
            </div>
        </div>
    </div>

    <div id="partnerModal" class="hidden modal-overlay text-right">
        <div class="glass-panel p-10 w-full max-w-sm mt-20 text-center relative">
            <button onclick="closePartnerModal()" class="absolute top-4 left-4 text-white/40"><i class="fas fa-times"></i></button>
            <h3 class="text-xl font-black mb-6">הוספת שותף</h3>
            <input type="email" id="partnerEmail" placeholder="מייל השותף" class="mb-8 ltr text-left">
            <button onclick="savePartner()" class="w-full py-4 bg-white text-black font-black rounded-2xl">שתף פרויקט</button>
        </div>
    </div>

    <div id="imageLightbox" class="hidden fixed inset-0 z-[3000] bg-black/90 backdrop-blur-xl flex items-center justify-center p-4" onclick="this.classList.add('hidden')">
        <button class="absolute top-8 left-8 text-white text-2xl opacity-50"><i class="fas fa-times"></i></button>
        <img id="fullScreenImg" src="" class="max-w-full max-h-full rounded-2xl shadow-2xl object-contain">
    </div>

<script>
const firebaseConfig = { apiKey: "AIzaSyB7U5xw_FMThsmM2hNMRnkdMYnD2cutH2s", authDomain: "project-manager-4702c.firebaseapp.com", projectId: "project-manager-4702c", storageBucket: "project-manager-4702c.firebasestorage.app", messagingSenderId: "941533299304", appId: "1:941533299304:web:92f8940e93a96b1f8b71dd" };
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth(), db = firebase.firestore();

let projects = [], currentProjectId = null, userEmail = "", isDashboard = false, isGantt = false, isArchiveView = false, tempAiTasks = [];
let myChart = null, categoryChart = null;

auth.onAuthStateChanged(u => {
    if(u){ userEmail = u.email.toLowerCase(); document.getElementById('authScreen').classList.add('hidden'); document.getElementById('appScreen').classList.remove('hidden'); loadData(); }
    else { document.getElementById('authScreen').classList.remove('hidden'); document.getElementById('appScreen').classList.add('hidden'); }
});

function loadData(){
    db.collection('family_plans').where('collaborators','array-contains',userEmail).onSnapshot(s => {
        projects = s.docs.map(d => ({id:d.id, ...d.data()}));
        renderUI();
        if(isDashboard) renderDashboard();
        if(isGantt) renderGantt();
        if(currentProjectId) renderProjectInfo();
    });
}

function renderUI(){
    const c=document.getElementById('projectsView');
    const f=projects.filter(p=>isArchiveView ? p.isArchived : !p.isArchived);
    c.innerHTML=f.map(p=>{
        const b=Number(p.budget||0), s=(p.tasks||[]).reduce((a,t)=>t.done?a+Number(t.price||0):a,0);
        const pr=b>0?Math.round((s/b)*100):0;
        return `<div class="glass-card p-8" onclick="openProjectDetail('${p.id}')">
            <div class="flex justify-between items-center mb-4"><h3 class="text-2xl font-black italic">${p.title}</h3><span class="text-xs opacity-40">₪${(b-s).toLocaleString()}</span></div>
            <div class="progress-container"><div class="progress-perc">${pr}% נוצל</div><div class="progress-bar"><div class="progress-fill" style="width:${Math.min(pr,100)}%"></div></div></div>
        </div>`
    }).join('')
}

function renderProjectInfo(){
    const p=projects.find(x=>x.id===currentProjectId); if(!p)return;
    const b=Number(p.budget||0), s=(p.tasks||[]).reduce((a,t)=>t.done?a+Number(t.price||0):a,0);
    const pr=b>0?Math.round((s/b)*100):0;
    document.getElementById('detailTitle').innerText=p.title;
    document.getElementById("projectUsers").innerHTML=(p.collaborators||[]).map(e=>`<div title="${e}" class="w-7 h-7 rounded-full bg-indigo-500 flex items-center justify-center text-xs font-bold border border-white/20">${e.charAt(0).toUpperCase()}</div>`).join("")+`<button onclick="openPartnerModal()" class="w-7 h-7 rounded-full bg-white/10 border border-white/20 text-[11px] hover:bg-white/20 transition">+</button>`;
    document.getElementById('balanceCard').innerHTML=`<div class="flex justify-between items-center mb-1 px-2"><span class="text-[10px] opacity-40 uppercase">יתרה לניצול</span><span class="text-[10px] opacity-40 font-bold">תקציב: ₪${b.toLocaleString()}</span></div><div class="text-4xl font-black italic mb-3">₪${(b-s).toLocaleString()}</div><div class="progress-container"><div class="progress-bar"><div class="progress-fill" style="width:${Math.min(pr,100)}%"></div></div></div>`;
    document.getElementById('tasksList').innerHTML=(p.tasks||[]).map((t,i)=>`<div class="bg-white/5 p-4 rounded-2xl flex items-center justify-between ${t.done?'task-done':''}"><div class="flex items-center gap-4 flex-1"><input type="checkbox" ${t.done?'checked':''} onchange="toggleTaskDone(${i})" class="w-5 h-5 accent-indigo-500"><div class="flex flex-col"><input type="text" value="${t.name}" oninput="editTaskName(${i},this.value)" class="bg-transparent text-white font-bold outline-none" /><span>₪${Number(t.price).toLocaleString()}</span></div></div><button onclick="deleteTask(${i})" class="text-red-400 opacity-30"><i class="fas fa-trash"></i></button></div>`).join("");
    document.getElementById('mediaGallery').innerHTML=(p.images||[]).map((img,i)=>`<div class="img-container relative"><button onclick="deleteImage(event, ${i})" class="del-img-btn"><i class="fas fa-trash"></i></button><img src="${img}" class="img-thumb cursor-zoom-in" onclick="openLightbox('${img}')"></div>`).join("");
}

async function handleAuth(t){const e=document.getElementById('emailInput').value.trim(),p=document.getElementById('passInput').value;if(!e||!p)return alert("מלא פרטים");try{if(t==="login")await auth.signInWithEmailAndPassword(e,p);else await auth.createUserWithEmailAndPassword(e,p);}catch(err){alert(err.message)}}
function goHome(){isDashboard=isGantt=false;document.getElementById('dashboardView').classList.add('hidden');document.getElementById('ganttView').classList.add('hidden');document.getElementById('projectsView').classList.remove('hidden')}
function toggleView(){isDashboard=!isDashboard;document.getElementById('projectsView').classList.toggle('hidden',isDashboard);document.getElementById('dashboardView').classList.toggle('hidden',!isDashboard);if(isDashboard)renderDashboard()}
function toggleGantt(){isGantt=!isGantt;document.getElementById('projectsView').classList.toggle('hidden',isGantt);document.getElementById('ganttView').classList.toggle('hidden',!isGantt);if(isGantt)renderGantt()}
function openNewProjectModal(){document.getElementById('newProjectModal').classList.remove('hidden')}
function closeNewProjectModal(){document.getElementById('newProjectModal').classList.add('hidden'); tempAiTasks=[]; document.getElementById('aiPreviewArea').classList.add('hidden')}
function openProjectDetail(id){currentProjectId=id;document.getElementById('projectDetailModal').classList.remove('hidden');renderProjectInfo()}
function closeProjectDetail(){document.getElementById('projectDetailModal').classList.add('hidden');currentProjectId=null}
function toggleProjectSettings(){document.getElementById('projectSettings').classList.toggle('hidden')}
function openLightbox(s){const lb=document.getElementById('imageLightbox');document.getElementById('fullScreenImg').src=s;lb.classList.remove('hidden')}
function openPartnerModal(){document.getElementById('partnerModal').classList.remove('hidden')}
function closePartnerModal(){document.getElementById('partnerModal').classList.add('hidden')}
function toggleArchiveView(){isArchiveView=!isArchiveView;renderUI()}

// --- Firestore/AI Actions ---
async function generateAIPreview(){
    const t=document.getElementById('pTitleInp').value.trim(); if(!t)return alert("מלא שם");
    const b=document.getElementById('aiBtn'); b.disabled=true; b.innerHTML="מנתח...";
    try{
        const g=firebase.app().functions("us-central1").httpsCallable("generateAIPlan");
        const r=await g({title:t,category:document.getElementById('pCatInp').value,budgetLevel:document.getElementById('budgetLevel').value});
        tempAiTasks=(Array.isArray(r.data)?r.data:(r.data?.tasks||[])).map(x=>({name:x.title||x.name,price:Number(x.price)||0,done:false}));
        renderAiPreviewList();
        document.getElementById('aiPreviewArea').classList.remove('hidden');
        document.getElementById('pBudgetInp').value=tempAiTasks.reduce((s,x)=>s+x.price,0);
    } catch(err){alert(err.message)} finally {b.disabled=false; b.innerHTML='✨ תכנן לי ב-AI'}
}
function renderAiPreviewList(){
    const c=document.getElementById('previewTasksContainer'); let t=0;
    c.innerHTML=tempAiTasks.map((x,i)=>{t+=x.price;return`<div class="bg-white/5 p-3 rounded-xl mb-2 flex items-center gap-3"><button onclick="removeTempTask(${i})" class="text-red-400/50"><i class="fas fa-times-circle"></i></button><input type="text" value="${x.name}" oninput="tempAiTasks[${i}].name=this.value" class="bg-transparent text-white font-bold flex-1 outline-none" /><div class="w-20 bg-white/10 text-white rounded-xl px-2 py-1 text-center font-bold">₪${x.price.toLocaleString()}</div></div>`}).join("");
    document.getElementById('totalLabel').innerText=`₪${t.toLocaleString()}`;
}
async function recalculateAI(){
    if (tempAiTasks.length === 0) return alert("אין משימות לעדכון");
    const title = document.getElementById('pTitleInp').value;
    const category = document.getElementById('pCatInp').value;
    const b = document.querySelector('button[onclick="recalculateAI()"]');
    const o = b.innerHTML; b.innerHTML = "מנתח..."; b.disabled = true;
    try {
        const g = firebase.app().functions("us-central1").httpsCallable("recalculateAIPlan");
        const res = await g({ title, category, tasks: tempAiTasks });
        tempAiTasks = (res.data.tasks || []).map(t => ({ name: t.title || t.name, price: Number(t.price) || 0, done: false }));
        renderAiPreviewList();
        document.getElementById('pBudgetInp').value = tempAiTasks.reduce((s, task) => s + task.price, 0);
    } catch (err) { alert(err.message); } finally { b.innerHTML = o; b.disabled = false; }
}
async function saveProject(){
    const t=document.getElementById('pTitleInp').value; if(!t)return alert("חובה שם");
    await db.collection('family_plans').add({title:t,category:document.getElementById('pCatInp').value,budget:Number(document.getElementById('pBudgetInp').value),startDate:document.getElementById('pStartInp').value,endDate:document.getElementById('pEndInp').value,collaborators:[userEmail],tasks:tempAiTasks,images:[],isArchived:false,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    closeNewProjectModal();
}
async function deleteProjectPermanently(){if(!currentProjectId)return;if(confirm("למחוק לצמיתות?")){await db.collection('family_plans').doc(currentProjectId).delete();closeProjectDetail();goHome();}}
async function toggleArchiveStatus(){if(!currentProjectId)return;const p=projects.find(x=>x.id===currentProjectId);await db.collection('family_plans').doc(currentProjectId).update({isArchived:!p.isArchived});closeProjectDetail();}
async function toggleTaskDone(i){const p=projects.find(x=>x.id===currentProjectId);let t=[...p.tasks];t[i].done=!t[i].done;await db.collection('family_plans').doc(currentProjectId).update({tasks:t})}
async function editTaskName(i,v){const p=projects.find(x=>x.id===currentProjectId);let t=[...p.tasks];t[i].name=v;await db.collection('family_plans').doc(currentProjectId).update({tasks:t})}
async function deleteTask(i){const p=projects.find(x=>x.id===currentProjectId);let t=[...p.tasks];t.splice(i,1);await db.collection('family_plans').doc(currentProjectId).update({tasks:t})}
async function addTask(){const n=document.getElementById('taskName').value.trim(),pr=Number(document.getElementById('taskPrice').value);if(!n||!pr)return;const p=projects.find(x=>x.id===currentProjectId);await db.collection('family_plans').doc(currentProjectId).update({tasks:[...(p.tasks||[]),{name:n,price:pr,done:false}]});document.getElementById('taskName').value="";document.getElementById('taskPrice').value=""}

// --- Media/Charts ---
function triggerUpload(){document.getElementById('imgUpload').click()}
async function compressAndUpload(i){if(!i.files[0]||!currentProjectId)return;const r=new FileReader();r.readAsDataURL(i.files[0]);r.onload=e=>{const img=new Image();img.src=e.target.result;img.onload=async()=>{const c=document.createElement("canvas"),m=800,s=m/img.width;c.width=m;c.height=img.height*s;c.getContext("2d").drawImage(img,0,0,c.width,c.height);const base64=c.toDataURL("image/jpeg",0.6);const p=projects.find(x=>x.id===currentProjectId);await db.collection("family_plans").doc(currentProjectId).update({images:[...(p?.images||[]), base64]});i.value="";if(confirm("לנתח עם AI?"))analyzeImageWithAI(base64);}};}
async function analyzeImageWithAI(base64){try{const g=firebase.app().functions("us-central1").httpsCallable("analyzeImage");const res=await g({image:base64});if(res.data?.title){const p=projects.find(x=>x.id===currentProjectId);const newTask={name:"✨ "+res.data.title,price:Number(res.data.price)||0,done:true};await db.collection('family_plans').doc(currentProjectId).update({tasks:[...(p.tasks||[]),newTask]});alert("נוספה משימה!");}}catch(err){console.error(err);}}
async function deleteImage(e,i){e.stopPropagation();if(!confirm("למחוק?")){const p=projects.find(x=>x.id===currentProjectId);let im=[...p.images];im.splice(i,1);await db.collection('family_plans').doc(currentProjectId).update({images:im})}}
function removeTempTask(i){tempAiTasks.splice(i,1);renderAiPreviewList()}
async function savePartner(){const e=document.getElementById('partnerEmail').value.trim().toLowerCase();if(!e||!currentProjectId)return;const p=projects.find(x=>x.id===currentProjectId);let c=[...(p.collaborators||[])];if(!c.includes(e))c.push(e);await db.collection('family_plans').doc(currentProjectId).update({collaborators:c});alert("שותף נוסף!");closePartnerModal()}
function exportToExcel(){alert("אקסל יופעל בקרוב")}

function renderDashboard(){
    let tp=0, ts=0; const pl=[], bd=[], sd=[]; const ct={};
    projects.forEach(p=>{if(p.isArchived)return; const b=Number(p.budget||0), s=(p.tasks||[]).reduce((a,t)=>t.done?a+Number(t.price||0):a,0); tp+=b; ts+=s; pl.push(p.title); bd.push(b); sd.push(s); const cat=p.category||"⚙️ כללי"; ct[cat]=(ct[cat]||0)+s;});
    document.getElementById('totalPlanned').innerText=`₪${tp.toLocaleString()}`; document.getElementById('totalSpent').innerText=`₪${ts.toLocaleString()}`;
    if(myChart)myChart.destroy(); if(categoryChart)categoryChart.destroy();
    const ctx1=document.getElementById('mainChart').getContext('2d');
    myChart=new Chart(ctx1,{type:'bar',data:{labels:pl,datasets:[{label:'תקציב',data:bd,backgroundColor:'rgba(255,255,255,0.1)',borderRadius:8},{label:'נוצל',data:sd,backgroundColor:'#818cf8',borderRadius:8}]},options:{responsive:true,maintainAspectRatio:false,scales:{y:{beginAtZero:true,grid:{color:'rgba(255,255,255,0.05)'},labels:{color:'white'}},x:{labels:{color:'white'}}}}});
    const ctx2=document.getElementById('categoryChart').getContext('2d');
    categoryChart=new Chart(ctx2,{type:'doughnut',data:{labels:Object.keys(ct),datasets:[{data:Object.values(ct),backgroundColor:['#818cf8','#f472b6','#fbbf24','#34d399','#60a5fa'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:'white'}}}}});
}
function renderGantt(){
    const container=document.getElementById('ganttRows');
    container.innerHTML=projects.filter(p=>!p.isArchived).map(p=>{
        const start=p.startDate?new Date(p.startDate).toLocaleDateString('he-IL'):'---';
        const end=p.endDate?new Date(p.endDate).toLocaleDateString('he-IL'):'---';
        const s=(p.tasks||[]).reduce((a,t)=>t.done?a+Number(t.price||0):a,0);
        const pr=p.budget>0?Math.min(Math.round((s/p.budget)*100),100):0;
        return `<div class="p-4 bg-white/5 rounded-2xl border border-white/5 mb-3 text-right"><div class="flex justify-between items-center mb-2"><span class="font-bold">${p.title}</span><span class="text-[10px] opacity-50">${start} - ${end}</span></div><div class="h-2 w-full bg-white/10 rounded-full overflow-hidden"><div class="h-full bg-indigo-500" style="width: ${pr}%"></div></div></div>`;
    }).join("");
}
