<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LifeOS Platinum</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-functions.js"></script>

    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes skeleton { 0% { opacity: 0.3; } 50% { opacity: 0.7; } 100% { opacity: 0.3; } }
        .animate-fadeIn { animation: fadeIn 0.3s ease forwards; }
        .skeleton { animation: skeleton 1.5s infinite ease-in-out; background: rgba(255,255,255,0.05); border-radius: 16px; }
        .modal-overlay { position: fixed; inset: 0; display: flex; align-items: flex-start; justify-content: center; background: rgba(10, 15, 28, 0.96); backdrop-filter: blur(22px); z-index: 1000; padding: 20px; overflow-y: auto; animation: fadeIn .25s ease; }
        body { font-family: 'Heebo', sans-serif; background: radial-gradient(circle at top right, #1e1b4b, #0f172a 80%); background-attachment: fixed; color: white; text-align: right; min-height: 100vh; margin: 0; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 36px; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(14px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 28px; transition: all .25s ease; cursor: pointer; }
        input, select { background: rgba(255, 255, 255, 0.92) !important; border-radius: 16px !important; color: #0f172a !important; padding: 12px !important; border: none !important; }
        .progress-bar { background: rgba(255,255,255,0.1); height: 8px; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; transition: width .8s ease; background: #fff; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4 flex justify-center items-start">

    <div id="authScreen" class="fixed inset-0 z-[2000] flex items-center justify-center bg-slate-950 p-6 text-center">
        <div class="glass-panel p-10 w-full max-w-sm">
            <h1 class="text-4xl font-black mb-10 italic">LifeOS</h1>
            <input type="email" id="emailInput" placeholder="אימייל" class="mb-3 text-left ltr">
            <input type="password" id="passInput" placeholder="סיסמה" class="mb-8 text-left ltr">
            <button onclick="handleAuth('login')" class="w-full py-4 bg-white text-slate-900 font-black rounded-2xl mb-3">כניסה</button>
            <button onclick="handleAuth('signup')" class="w-full py-4 border border-white/20 text-white font-bold rounded-2xl">יצירת משתמש</button>
        </div>
    </div>

    <div id="appScreen" class="hidden glass-panel w-full max-w-5xl h-[92vh] flex flex-col overflow-hidden relative shadow-2xl">
        <header class="p-6 flex justify-between items-center border-b border-white/5">
            <div class="flex gap-3 items-center">
                <h1 onclick="goHome()" class="text-2xl font-black italic cursor-pointer">LifeOS</h1>
                <button onclick="toggleGantt()" class="p-3 bg-white/5 rounded-xl"><i class="fas fa-calendar-alt"></i></button>
            </div>
            <div class="flex gap-2 items-center">
                <button onclick="openAccessibilityModal()" class="text-white/30 text-[11px] bg-white/5 px-2 py-1.5 rounded-lg border border-white/5"><i class="fas fa-universal-access"></i> נגישות</button>
                <button onclick="toggleView()" class="px-4 py-2 bg-white/10 rounded-xl text-[10px] font-black uppercase">דשבורד</button>
                <button onclick="auth.signOut()" class="text-white/20 p-2"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-6">
            <div id="aiInsightCard" class="hidden glass-card p-6 border-r-4 border-indigo-500 mb-6 animate-fadeIn flex gap-4">
                <div class="text-indigo-400 text-xl"><i class="fas fa-brain"></i></div>
                <div><span class="text-[10px] opacity-40 font-bold uppercase block mb-1">תובנת AI</span><p id="aiInsightText" class="text-sm italic"></p></div>
            </div>
            <div id="projectsView"></div>
            <div id="dashboardView" class="hidden space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div class="glass-card p-6 text-center"><span class="text-xs opacity-50">תכנון</span><div class="text-xl font-black" id="totalPlanned">₪0</div></div>
                    <div class="glass-card p-6 text-center border-r-4 border-purple-500"><span class="text-xs opacity-50">נוצל</span><div class="text-xl font-black text-purple-400" id="totalSpent">₪0</div></div>
                </div>
                <div class="h-64 relative"><canvas id="mainChart"></canvas></div>
            </div>
            <div id="ganttView" class="hidden space-y-4"></div>
        </main>

        <button onclick="openNewProjectModal()" class="absolute bottom-8 left-8 w-16 h-16 bg-white text-slate-900 rounded-2xl flex items-center justify-center shadow-2xl hover:scale-110 transition-transform"><i class="fas fa-plus"></i></button>
    </div>

    <div id="newProjectModal" class="hidden modal-overlay">
        <div class="glass-panel p-8 w-full max-w-md mt-4 relative">
            <button onclick="closeNewProjectModal()" class="absolute top-4 left-4 opacity-40"><i class="fas fa-times"></i></button>
            <h3 class="text-xl font-black mb-6 text-center italic">פרויקט חדש ✨</h3>
            <div class="space-y-4 text-right">
                <input type="text" id="pTitleInp" placeholder="שם הפרויקט..." class="text-center">
                <div id="aiSkeleton" class="hidden space-y-2"><div class="h-10 skeleton"></div><div class="h-10 skeleton"></div></div>
                <div id="aiPreviewArea" class="hidden bg-white/5 p-4 rounded-2xl"><div id="previewTasksContainer" class="space-y-2 mb-3"></div><button onclick="recalculateAI()" class="text-[10px] text-indigo-300">חשב מחדש</button></div>
                <select id="budgetLevel"><option value="economy">חסכוני</option><option value="standard" selected>רגיל</option><option value="premium">פרימיום</option></select>
                <button id="aiBtn" onclick="generateAIPreview()" class="w-full py-4 bg-gradient-to-r from-indigo-500 to-purple-500 text-white font-black rounded-2xl">תכנן ב-AI</button>
                <button onclick="saveProject()" class="w-full py-4 bg-white text-black font-black rounded-2xl">שמור</button>
            </div>
        </div>
    </div>

    <div id="projectDetailModal" class="hidden modal-overlay">
        <div class="glass-panel p-8 w-full max-w-2xl mt-4 relative">
            <button onclick="closeProjectDetail()" class="absolute top-4 left-4 opacity-40"><i class="fas fa-times"></i></button>
            <h2 id="detailTitle" class="text-2xl font-black mb-4"></h2>
            <div id="balanceCard" class="glass-card p-6 mb-6"></div>
            <div id="tasksList" class="space-y-2 mb-6"></div>
            <button onclick="triggerUpload()" class="w-full py-4 border-2 border-dashed border-white/10 rounded-2xl">📸 העלה קבלה</button>
            <input type="file" id="imgUpload" class="hidden" onchange="compressAndUpload(this)">
        </div>
    </div>

    <div id="accessibilityModal" class="hidden modal-overlay">
        <div class="glass-panel p-8 w-full max-w-md relative"><button onclick="closeAccessibilityModal()" class="absolute top-4 left-4">X</button><h3 class="text-xl font-bold mb-4 italic">הצהרת נגישות ♿</h3><p class="text-sm opacity-80">האתר מונגש ברמת AA לפי התקן הישראלי.</p></div>
    </div>

<script>
const firebaseConfig = { apiKey: "AIzaSyB7U5xw_FMThsmM2hNMRnkdMYnD2cutH2s", authDomain: "project-manager-4702c.firebaseapp.com", projectId: "project-manager-4702c", storageBucket: "project-manager-4702c.firebasestorage.app" };
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth(), db = firebase.firestore();

let projects = [], currentProjectId = null, userEmail = "", isDashboard = false, tempAiTasks = [];
let myChart = null;

function escapeHTML(str) { return str ? str.toString().replace(/[&<>"']/g, m => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#039;" }[m])) : ""; }

auth.onAuthStateChanged(u => {
    if(u){ userEmail = u.email.toLowerCase(); document.getElementById('authScreen').classList.add('hidden'); document.getElementById('appScreen').classList.remove('hidden'); loadData(); }
    else { document.getElementById('authScreen').classList.remove('hidden'); document.getElementById('appScreen').classList.add('hidden'); }
});

function loadData(){
    db.collection('family_plans').where('collaborators','array-contains',userEmail).onSnapshot(s => {
        projects = s.docs.map(d => ({id:d.id, ...d.data()}));
        renderUI();
        if(isDashboard) { renderDashboard(); refreshAIInsights(); }
        if(currentProjectId) renderProjectInfo();
    });
}

// UI Actions
function goHome(){ isDashboard=false; document.querySelectorAll('.modal-overlay').forEach(m=>m.classList.add('hidden')); document.getElementById('dashboardView').classList.add('hidden'); document.getElementById('projectsView').classList.remove('hidden'); }
function toggleView(){ isDashboard=!isDashboard; document.getElementById('projectsView').classList.toggle('hidden',isDashboard); document.getElementById('dashboardView').classList.toggle('hidden',!isDashboard); if(isDashboard) renderDashboard(); }
function openAccessibilityModal(){ document.getElementById('accessibilityModal').classList.remove('hidden'); }
function closeAccessibilityModal(){ document.getElementById('accessibilityModal').classList.add('hidden'); }
function openNewProjectModal(){ document.getElementById('newProjectModal').classList.remove('hidden'); }
function closeNewProjectModal(){ document.getElementById('newProjectModal').classList.add('hidden'); tempAiTasks=[]; }
function openProjectDetail(id){ currentProjectId=id; document.getElementById('projectDetailModal').classList.remove('hidden'); renderProjectInfo(); }
function closeProjectDetail(){ document.getElementById('projectDetailModal').classList.add('hidden'); currentProjectId=null; }

// AI Insights
async function refreshAIInsights() {
    if (projects.length < 2) return;
    try {
        const fn = firebase.app().functions("us-central1").httpsCallable("getGlobalInsights");
        const res = await fn({ projectData: projects.slice(0,5).map(p => ({ title: p.title, budget: p.budget, spent: (p.tasks||[]).reduce((s,t)=>t.done?s+t.price:s, 0) })) });
        if(res.data?.insight) { document.getElementById('aiInsightText').innerText = res.data.insight; document.getElementById('aiInsightCard').classList.remove('hidden'); }
    } catch(e) {}
}

// Rendering
function renderUI() {
    const container = document.getElementById('projectsView');
    container.className = "grid grid-cols-1 md:grid-cols-2 gap-6";
    container.innerHTML = projects.map(p => {
        const spent = (p.tasks || []).reduce((acc, t) => t.done ? acc + Number(t.price) : acc, 0);
        const pr = Math.min(Math.round((spent / p.budget) * 100), 100);
        return `<div class="glass-card p-8" onclick="openProjectDetail('${p.id}')">
            <h3 class="text-xl font-bold mb-2">${escapeHTML(p.title)}</h3>
            <div class="progress-bar"><div class="progress-fill" style="width:${pr}%"></div></div>
        </div>`;
    }).join('');
}

function renderProjectInfo() {
    const p = projects.find(x => x.id === currentProjectId);
    if (!p) return;
    document.getElementById('detailTitle').innerText = p.title;
    document.getElementById('tasksList').innerHTML = (p.tasks || []).map((t, i) => `
        <div class="flex justify-between bg-white/5 p-3 rounded-xl">
            <span>${escapeHTML(t.name)}</span>
            <b>₪${t.price}</b>
        </div>`).join("");
}

// AI Functions
async function generateAIPreview(){
    const t=document.getElementById('pTitleInp').value.trim(); if(!t) return;
    document.getElementById('aiSkeleton').classList.remove('hidden');
    try {
        const g = firebase.app().functions("us-central1").httpsCallable("generateAIPlan");
        const r = await g({ title: t, budgetLevel: document.getElementById('budgetLevel').value });
        tempAiTasks = r.data.tasks;
        document.getElementById('previewTasksContainer').innerHTML = tempAiTasks.map(tk => `<div>${tk.title}: ₪${tk.price}</div>`).join("");
        document.getElementById('aiPreviewArea').classList.remove('hidden');
    } catch(e) {} finally { document.getElementById('aiSkeleton').classList.add('hidden'); }
}

async function saveProject(){
    const t=document.getElementById('pTitleInp').value;
    await db.collection('family_plans').add({
        title: t,
        budget: tempAiTasks.reduce((s,x)=>s+x.price, 0),
        collaborators: [userEmail],
        tasks: tempAiTasks.map(tk => ({name: tk.title, price: tk.price, done: false})),
        isArchived: false,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    closeNewProjectModal();
}

async function handleAuth(t){
    const e=document.getElementById('emailInput').value, p=document.getElementById('passInput').value;
    try { t==='login' ? await auth.signInWithEmailAndPassword(e,p) : await auth.createUserWithEmailAndPassword(e,p); } catch(err){alert(err.message)}
}

// Analytics
function renderDashboard() {
    if (myChart) myChart.destroy();
    const ctx = document.getElementById('mainChart').getContext('2d');
    myChart = new Chart(ctx, {
        type: 'bar',
        data: { labels: projects.map(p=>p.title), datasets: [{ label: 'תקציב', data: projects.map(p=>p.budget), backgroundColor: '#818cf8' }] },
        options: { responsive: true, maintainAspectRatio: false, scales: { y: { ticks: { color: 'white' } }, x: { ticks: { color: 'white' } } } }
    });
}
</script>
</body>
</html>
